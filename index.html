<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shadow Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #05070f;
    --bg-glow: radial-gradient(ellipse 900px 500px at 50% -10%, rgba(79,195,247,0.10), transparent 60%);
    --panel: #0c1226;
    --panel-alt: #101838;
    --border: rgba(94,169,255,0.28);
    --border-strong: rgba(94,169,255,0.55);
    --blue: #4fc3f7;
    --blue-dim: #2b6f96;
    --purple: #c0afff;
    --gold: #f6c453;
    --green: #34d399;
    --red: #faa2a2;
    --text: #e7ecfb;
    --text-dim: #b3b9d1;
    --text-mid: #b0bad4;
    --text-dim2: #b3bacd;
    --radius-cut: 14px;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--bg-glow), var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    padding: 28px 18px 60px;
    position: relative;
    overflow-x: hidden;
  }
  body::before{
    content:"";
    position: fixed; inset:0;
    background-image:
      linear-gradient(rgba(79,195,247,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.035) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, black, transparent 75%);
  }

  /* ---------- Ambient particles ---------- */
  .particle-field{
    position: fixed; inset:0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle{
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 6px 1px rgba(79,195,247,0.8);
    animation-name: drift-up;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes drift-up{
    0%{ transform: translateY(0) translateX(0); opacity:0; }
    8%{ opacity:1; }
    92%{ opacity:1; }
    100%{ transform: translateY(-105vh) translateX(24px); opacity:0; }
  }

  /* ---------- Scanline sweep ---------- */
  .scanline{
    position: fixed; left:0; right:0;
    height: 140px;
    top: -140px;
    pointer-events: none;
    z-index: 1;
    background: linear-gradient(180deg, transparent, rgba(79,195,247,0.05), transparent);
    animation: scan-sweep 9s linear infinite;
  }
  @keyframes scan-sweep{
    0%{ top: -140px; }
    100%{ top: 100vh; }
  }

  .levelup-flash{
    position: fixed; inset:0; z-index: 55; pointer-events:none;
    background: radial-gradient(circle at 50% 38%, rgba(79,195,247,0.55), rgba(139,107,255,0.18) 42%, transparent 72%);
    animation: levelup-flash-anim 0.9s ease-out forwards;
  }
  @keyframes levelup-flash-anim{
    0%{ opacity:0; }
    15%{ opacity:1; }
    100%{ opacity:0; }
  }

  .wrap{ max-width: 980px; margin: 0 auto; position: relative; z-index:1; }

  ::selection{ background: rgba(79,195,247,0.35); }

  button, select, input{ font-family: inherit; touch-action: manipulation; }
  button{ cursor:pointer; }
  :focus-visible{ outline: 2px solid var(--blue); outline-offset: 2px; }

  /* ---------- Panel / signature "System Window" shell ---------- */
  .panel{
    background: linear-gradient(180deg, var(--panel), #0a0e20);
    border: 1px solid var(--border);
    clip-path: polygon(var(--radius-cut) 0, 100% 0, 100% calc(100% - var(--radius-cut)), calc(100% - var(--radius-cut)) 100%, 0 100%, 0 var(--radius-cut));
    padding: 22px 24px;
    position: relative;
  }
  .panel::before, .panel::after{
    content:"";
    position:absolute;
    width: 20px; height: 20px;
    pointer-events: none;
    animation: corner-pulse 4s ease-in-out infinite;
  }
  .panel::before{
    top:-1px; left:-1px;
    border-top: 2px solid var(--blue);
    border-left: 2px solid var(--blue);
    clip-path: polygon(0 0, 100% 0, 0 100%);
    opacity: 0.9;
  }
  .panel::after{
    bottom:-1px; right:-1px;
    border-bottom: 2px solid var(--blue);
    border-right: 2px solid var(--blue);
    clip-path: polygon(100% 100%, 0 100%, 100% 0);
    opacity: 0.9;
    animation-delay: 2s;
  }
  @keyframes corner-pulse{
    0%, 70%, 100%{ opacity: 0.9; filter: drop-shadow(0 0 0 transparent); }
    85%{ opacity: 1; filter: drop-shadow(0 0 4px var(--blue)); }
  }

  .eyebrow{
    font-family:'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--blue);
    text-transform: uppercase;
    display:flex; align-items:center; gap:8px;
    margin-bottom: 14px;
  }
  .eyebrow .dot{ width:7px; height:7px; background: var(--blue); box-shadow: 0 0 8px var(--blue); transform: rotate(45deg); }
  .panel-eyebrow-row{ justify-content:space-between; }
  .eyebrow-label{ display:flex; align-items:center; gap:8px; }
  .panel-gear-btn{
    background:none;
    border:1px solid var(--border);
    color: var(--text-dim2);
    width:24px; height:24px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    cursor:pointer;
    transition: all .2s ease;
    flex-shrink:0;
  }
  .panel-gear-btn:hover{ color: var(--blue); border-color: var(--border-strong); box-shadow: 0 0 8px rgba(79,195,247,0.3); transform: rotate(35deg); }

  /* ---------- Header ---------- */
  .title-block{ text-align:center; margin-bottom: 26px; }
  .title-block h1{
    font-family:'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 44px);
    letter-spacing: 6px;
    margin: 0;
    background: linear-gradient(180deg, #ffffff, var(--blue) 140%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 40px rgba(79,195,247,0.25);
  }
  .title-block p{
    margin: 8px 0 0;
    color: var(--text-dim2);
    font-size: 14px;
    letter-spacing: 1px;
  }
  .hunter-identity{
    margin-top: 14px;
    display:flex; align-items:center; justify-content:center;
    gap: 14px;
  }
  .hunter-avatar-frame{
    width: 60px; height: 60px;
    flex-shrink: 0;
    border: 2px solid var(--rank-color, var(--blue));
    box-shadow: 0 0 14px var(--rank-color-glow, rgba(79,195,247,0.4));
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    background: rgba(255,255,255,0.03);
    display:flex; align-items:center; justify-content:center;
    overflow: hidden;
  }
  .hunter-avatar-frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .avatar-placeholder{ color: var(--text-dim2); font-size:26px; }
  .hunter-name-display{
    font-family:'Orbitron', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    color: var(--blue);
    text-shadow: 0 0 8px rgba(79,195,247,0.4);
  }
  .hunter-name-col{ display:flex; flex-direction:column; align-items:flex-start; gap:3px; }
  .hunter-title-display{
    font-family:'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--gold);
    text-shadow: 0 0 8px rgba(246,196,83,0.4);
  }

  /* ---------- Penalty quest ---------- */
  .penalty-panel{ border-color: rgba(247,107,107,0.5); }
  .penalty-panel::before{ border-top-color: var(--red); border-left-color: var(--red); }
  .penalty-panel::after{ border-bottom-color: var(--red); border-right-color: var(--red); }
  .penalty-eyebrow{ color: var(--red); }
  .penalty-dot{ background: var(--red) !important; box-shadow: 0 0 8px var(--red) !important; }
  .penalty-warning{
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.5;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: rgba(247,107,107,0.06);
    border-left: 3px solid var(--red);
  }
  .penalty-warning b{ color: var(--red); }
  .penalty-rows{ display:flex; flex-direction:column; gap:10px; }
  .penalty-row{ display:flex; align-items:center; gap:12px; font-size:13px; }
  .penalty-ex-name{ flex-basis: 200px; flex-shrink:0; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
  .penalty-ex-name span{ font-size:11px; letter-spacing:1.5px; margin-right:6px; }
  .penalty-track{ flex:1; }
  .penalty-target{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--text-mid); flex-shrink:0; }
  .penalty-row.met .penalty-target{ color: var(--green); }
  .penalty-cleared-msg{ font-size:14px; color: var(--green); font-weight:600; letter-spacing:0.5px; text-shadow: 0 0 10px rgba(52,211,153,0.4); }
  .penalty-cleared-msg b{ color:#fff; }
  .penalty-panel.cleared{ border-color: rgba(52,211,153,0.5); }
  .penalty-panel.cleared::before{ border-top-color: var(--green); border-left-color: var(--green); }
  .penalty-panel.cleared::after{ border-bottom-color: var(--green); border-right-color: var(--green); }
  .penalty-panel.cleared .penalty-eyebrow{ color: var(--green); }
  .penalty-panel.cleared .penalty-dot{ background: var(--green) !important; box-shadow: 0 0 8px var(--green) !important; }
  .penalty-restored-banner{ color: var(--green) !important; text-shadow: 0 0 12px rgba(52,211,153,0.5) !important; }
  @media (max-width: 560px){
    .penalty-row{ flex-wrap: wrap; }
    .penalty-ex-name{ flex-basis: 100%; }
  }

  /* ---------- Weekly boss ---------- */
  .boss-card{ display:flex; flex-direction:column; gap:12px; }
  .boss-encounter{ display:flex; align-items:stretch; gap:20px; }
  .boss-portrait-frame-lg{
    width:180px; height:210px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    border: 2px solid var(--boss-color);
    box-shadow: 0 0 18px var(--boss-color);
    clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
    background: rgba(255,255,255,0.02);
    overflow: hidden;
  }
  .boss-portrait-frame-lg img{ width:100%; height:100%; object-fit:cover; display:block; }
  .boss-sigil{
    font-size:30px; line-height:1;
    color: var(--boss-color);
    text-shadow: 0 0 16px var(--boss-color);
    flex-shrink:0;
  }
  .boss-sigil-lg{ font-size:70px; }
  .boss-sigil-fallback{ display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
  .boss-card.slain .boss-sigil{ color: var(--green); text-shadow: 0 0 16px rgba(52,211,153,0.6); }
  .boss-card.slain .boss-portrait-frame-lg{ border-color: var(--green); box-shadow: 0 0 12px rgba(52,211,153,0.6); filter: grayscale(0.4); }
  .boss-info-col{ flex:1; min-width:0; display:flex; flex-direction:column; justify-content:space-between; }
  .boss-id-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .boss-id{ flex:1; min-width:0; }
  .boss-lifetime-badge{
    flex-shrink:0;
    text-align:center;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    padding: 8px 14px;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }
  .boss-lifetime-num{ font-family:'Orbitron', sans-serif; font-size:24px; font-weight:900; color: var(--gold); text-shadow: 0 0 10px rgba(246,196,83,0.4); line-height:1; }
  .boss-lifetime-label{ font-size:11px; letter-spacing:1px; color: var(--text-mid); margin-top:4px; line-height:1.3; text-transform:uppercase; }
  .boss-name{ font-family:'Orbitron', sans-serif; font-size:22px; color:#fff; letter-spacing:1px; }
  .boss-meta{ font-size:13px; color: var(--text-dim2); margin-top:6px; letter-spacing:0.5px; }
  .boss-timer{ font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--gold); margin-top:12px; }
  .boss-hp-block{ margin-top:16px; }
  .boss-hp-track{
    height:18px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    overflow:hidden;
    border-radius: 3px;
  }
  .boss-hp-fill{
    height:100%;
    background: linear-gradient(90deg, #7a1f1f, var(--boss-color));
    box-shadow: 0 0 12px var(--boss-color);
    transition: width .6s cubic-bezier(.2,.8,.2,1);
  }
  .boss-hp-text{ font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--text-mid); margin-top:8px; }
  .boss-slain-stamp{ color: var(--green); font-weight:700; letter-spacing:0.5px; text-shadow: 0 0 8px rgba(52,211,153,0.4); }
  .boss-damage-line{ color: var(--boss-color, #ffa195) !important; }
  .boss-slain-banner{ color: var(--green) !important; text-shadow: 0 0 12px rgba(52,211,153,0.5) !important; }
  @media (max-width: 560px){
    .boss-encounter{ flex-direction:column; align-items:center; text-align:center; }
    .boss-portrait-frame-lg{ width:100%; max-width:260px; height:200px; }
    .boss-info-col{ width:100%; align-items:center; }
    .boss-id-row{ flex-direction:column; align-items:center; gap:10px; }
  }
  .boss-log-row{
    display:flex; align-items:center; gap:12px;
    padding:7px 0;
    font-size:12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-family:'JetBrains Mono', monospace;
  }
  .boss-log-row:last-child{ border-bottom:none; }
  .boss-log-name{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:'Rajdhani', sans-serif; font-weight:700; font-size:13px; }
  .boss-log-dealt{ color: var(--text-dim2); }
  .boss-log-result.win{ color: var(--green); font-weight:700; }
  .boss-log-result.loss{ color: var(--text-dim2); }
  .boss-log-week{ color: var(--text-dim2); }

  /* ---------- Achievements ---------- */
  .achievements-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap:12px; }
  .ach-summary{ grid-column: 1 / -1; font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--text-dim2); }
  .achievement-chip{
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    padding: 12px 14px;
    display:flex; flex-direction:column; gap:5px;
  }
  .achievement-chip.locked{ opacity: 0.45; }
  .achievement-chip.unlocked{ border-color: rgba(246,196,83,0.45); }
  .achievement-chip.equipped{ border-color: var(--gold); box-shadow: 0 0 12px rgba(246,196,83,0.25); }
  .ach-head{ display:flex; align-items:center; gap:8px; }
  .ach-icon{ font-size:14px; }
  .ach-name{ font-family:'Orbitron', sans-serif; font-size:13px; color:#fff; }
  .ach-title{ font-size:12px; color: var(--gold); font-weight:600; letter-spacing:0.5px; }
  .ach-desc{ font-size:12px; color: var(--text-dim2); line-height:1.4; flex:1; }
  .achievement-chip .btn{ margin-top:6px; align-self:flex-start; }
  .ach-locked-note{ font-size:11px; letter-spacing:1.5px; color: var(--text-dim2); margin-top:6px; }
  .achievement-unlock{ color: var(--gold) !important; }
  .achievement-title-line{ display:block; font-family:'Rajdhani', sans-serif; font-size:13px; font-weight:600; margin-top:4px; letter-spacing:0.5px; }

  .settings-btn{
    position: fixed;
    top: 16px; right: 16px;
    z-index: 40;
    width: 36px; height: 36px;
    display:flex; align-items:center; justify-content:center;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(12,18,38,0.7);
    color: var(--text-dim2);
    font-size: 17px;
    cursor: pointer;
    transition: all .2s ease;
    backdrop-filter: blur(4px);
  }
  .settings-btn:hover{ color: var(--blue); border-color: var(--border-strong); box-shadow: 0 0 12px rgba(79,195,247,0.3); transform: rotate(35deg); }

  /* ---------- Player status panel ---------- */
  .status-grid{
    display:grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px 28px;
    align-items:center;
  }
  .rank-badge{
    font-family:'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 34px;
    width: 64px; height: 64px;
    display:flex; align-items:center; justify-content:center;
    border: 2px solid var(--rank-color, var(--blue));
    color: var(--rank-color, var(--blue));
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    text-shadow: 0 0 14px var(--rank-color, var(--blue));
    box-shadow: inset 0 0 18px rgba(79,195,247,0.08);
    flex-shrink:0;
    animation: badge-breathe 3.2s ease-in-out infinite;
  }
  @keyframes badge-breathe{
    0%, 100%{ box-shadow: inset 0 0 18px rgba(79,195,247,0.08), 0 0 6px var(--rank-color, var(--blue)); }
    50%{ box-shadow: inset 0 0 18px rgba(79,195,247,0.08), 0 0 20px var(--rank-color, var(--blue)); }
  }
  .level-info{ min-width: 0; }
  .level-row{
    display:flex; align-items:baseline; gap:12px; margin-bottom:8px; flex-wrap:wrap;
  }
  .level-row .lv{
    font-family:'JetBrains Mono', monospace;
    font-size: 22px; font-weight:700; color:#fff;
  }
  .level-row .lv span{ color: var(--blue); }
  .level-row .rank-label{ font-size:13px; color:var(--text-dim2); letter-spacing:1px; }
  .xp-bar-track{
    height: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    position:relative;
    overflow:hidden;
  }
  .xp-bar-fill{
    height:100%;
    background: linear-gradient(90deg, var(--blue-dim), var(--blue));
    box-shadow: 0 0 12px rgba(79,195,247,0.6);
    transition: width 0.6s cubic-bezier(.2,.8,.2,1);
    width:0%;
    position: relative;
    overflow: hidden;
  }
  .xp-bar-fill::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.55) 48%, transparent 66%);
    background-size: 60% 100%;
    animation: shimmer-sweep 2.6s linear infinite;
  }
  @keyframes shimmer-sweep{
    0%{ background-position: -80% 0; }
    100%{ background-position: 180% 0; }
  }
  .xp-text{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim2);
    margin-top:6px; letter-spacing: 0.5px;
  }
  .streak-block{ text-align:center; flex-shrink:0; }
  .streak-num{
    font-family:'Orbitron', sans-serif;
    font-size: 30px; font-weight:700; color: var(--gold);
    line-height:1;
    text-shadow: 0 0 14px rgba(246,196,83,0.4);
  }
  .streak-label{ font-size:11px; color: var(--text-dim2); letter-spacing:2px; margin-top:4px; }
  .streak-bonus{ font-family:'JetBrains Mono', monospace; font-size:11px; color: var(--green); margin-top:4px; }
  .grace-status{ font-size:11px; color: var(--text-dim2); margin-top:4px; letter-spacing:0.5px; }

  /* ---------- Stats row ---------- */
  .substats{
    display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-top:22px;
  }
  .substat{ }
  .substat-head{ display:flex; justify-content:space-between; font-size:12px; letter-spacing:1.5px; margin-bottom:6px; }
  .substat-head b{ font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:500; color: var(--text-mid); }
  .substat-head em{ font-style:normal; font-size:11px; color: var(--text-mid); letter-spacing:1px; margin-left:6px; }

  /* ---------- Info bubbles ---------- */
  .info-btn{
    display:inline-flex; align-items:center; justify-content:center;
    width:15px; height:15px;
    border-radius:50%;
    border: 1px solid var(--text-dim2);
    color: var(--text-dim2);
    background: transparent;
    font-family:'JetBrains Mono', monospace;
    font-size:10px; font-weight:700;
    line-height:1;
    padding:0;
    margin-left:6px;
    vertical-align:middle;
    cursor:pointer;
    flex-shrink:0;
  }
  .info-btn:hover, .info-btn.active{ border-color: var(--blue); color: var(--blue); box-shadow: 0 0 6px rgba(79,195,247,0.4); }
  .info-popover{
    position: fixed;
    z-index: 60;
    max-width: 260px;
    background: linear-gradient(180deg, #0d1530, #070a18);
    border: 1px solid var(--blue);
    box-shadow: 0 0 24px rgba(79,195,247,0.2);
    padding: 12px 14px;
    font-size: 12px;
    line-height:1.5;
    color: var(--text-mid);
    display: none;
    clip-path: polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .info-popover.show{ display:block; }
  .info-popover .info-title{
    font-family:'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "shadowlog-state";

  // Claude's artifact storage only exists inside Claude. When this file is opened
  // standalone (e.g. hosted on GitHub Pages, or double-clicked locally), fall back
  // to localStorage so progress still saves — just scoped to this browser/device.
  const HAS_CLAUDE_STORAGE = (typeof window !== "undefined") && !!window.storage && typeof window.storage.get === "function";
  const IS_STANDALONE = !HAS_CLAUDE_STORAGE;

  async function storageGet(key){
    if(HAS_CLAUDE_STORAGE) return window.storage.get(key, false);
    const raw = localStorage.getItem(key);
    if(raw === null) throw new Error("No local data for " + key);
    return { key, value: raw, shared:false };
  }
  async function storageSet(key, value){
    if(HAS_CLAUDE_STORAGE) return window.storage.set(key, value, false);
    localStorage.setItem(key, value);
    return { key, value, shared:false };
  }

  const DEFAULT_EXERCISES = [
    {id:"pushups", name:"Push-Ups", category:"STR", type:"reps"},
    {id:"pullups", name:"Pull-Ups", category:"STR", type:"reps"},
    {id:"dips", name:"Dips", category:"STR", type:"reps"},
    {id:"rows", name:"Bodyweight Rows", category:"STR", type:"reps"},
    {id:"squats", name:"Squats", category:"AGI", type:"reps"},
    {id:"lunges", name:"Lunges", category:"AGI", type:"reps"},
    {id:"burpees", name:"Burpees", category:"AGI", type:"reps"},
    {id:"mtnclimbers", name:"Mountain Climbers", category:"AGI", type:"reps"},
    {id:"plank", name:"Plank", category:"VIT", type:"time"},
    {id:"handstand", name:"Handstand Hold", category:"VIT", type:"time"},
    {id:"legraises", name:"Leg Raises", category:"VIT", type:"reps"},
    {id:"situps", name:"Sit-Ups", category:"VIT", type:"reps"},
    {id:"jogging", name:"Jogging", category:"AGI", type:"minutes"},
  ];

  // ---------- effort model ----------
  // XP is scored by how much load you actually moved, expressed as a fraction of your own
  // bodyweight, so difficulty is measured rather than assumed. A rep of an exercise that
  // moves 100% of your bodyweight is worth more than one that moves 45%, and adding external
  // weight raises the ratio linearly — 10 reps at 100 lbs is exactly twice 10 reps at 50 lbs.
  // Time-based cardio can't be scored by load, so it uses METs (metabolic equivalents), the
  // standard intensity measure: jogging at ~7 METs outpaces walking at ~3.5 per minute.
  const XP_MODEL_VERSION = 2;
  const DEFAULT_BODYWEIGHT = 175; // lbs — overridden in Settings
  // Calibration constants, tuned so a typical session lands near the old flat-rate XP totals.
  const XP_K = { reps: 2.0, time: 0.7, met: 0.45 };
  // Fraction of bodyweight moved per rep (or supported, for holds).
  const DEFAULT_LOAD_FRACTION = {
    pushups:0.64, pullups:1.0, dips:0.95, rows:0.55,
    squats:0.45, lunges:0.5, burpees:0.7, mtnclimbers:0.35,
    plank:0.55, handstand:1.0, legraises:0.4, situps:0.35,
  };
  const FALLBACK_LOAD_FRACTION = { reps:0.5, time:0.5 };
  const MISSING_WEIGHT_FRACTION = 0.25; // used when a loaded lift is logged with no weight entered
  const DEFAULT_MET = { jogging:7 };
  const FALLBACK_MET = 4.5;

  function bodyweightLbs(){
    const b = state && state.bodyweight;
    return (typeof b === "number" && b > 0) ? b : DEFAULT_BODYWEIGHT;
  }
  // Per-exercise load fraction: user override, then the default table, then a by-type fallback.
  // Accepts entries from old logs too, since those carry id and type.
  function loadFractionFor(ex){
    const custom = state && state.exerciseLoads && state.exerciseLoads[ex.id];
    if(typeof custom === "number" && custom >= 0) return custom;
    if(DEFAULT_LOAD_FRACTION[ex.id] != null) return DEFAULT_LOAD_FRACTION[ex.id];
    // A ⚖ weight-tracked exercise the System doesn't recognise is assumed to be an external-load
    // lift (a curl, a press) where your body isn't the resistance — so the bar alone is the load,
    // and doubling it doubles the XP. Override the % if it's a loaded bodyweight movement.
    if(state && state.exerciseWeights && state.exerciseWeights[ex.id]) return 0;
    return FALLBACK_LOAD_FRACTION[ex.type] != null ? FALLBACK_LOAD_FRACTION[ex.type] : 0.5;
  }
  function metFor(ex){
    const custom = state && state.exerciseMets && state.exerciseMets[ex.id];
    if(typeof custom === "number" && custom > 0) return custom;
    if(DEFAULT_MET[ex.id] != null) return DEFAULT_MET[ex.id];
    return FALLBACK_MET;
  }
  // XP for one set. `weight` is the external load in lbs for that set, if any.
  function setXp(ex, amount, weight){
    if(!amount || amount <= 0) return 0;
    if(ex.type === "minutes") return amount * metFor(ex) * XP_K.met;
    const bw = bodyweightLbs();
    const ext = (typeof weight === "number" && weight > 0) ? weight : 0;
    let ratio = (loadFractionFor(ex) * bw + ext) / bw;
    // An external-load lift logged without a weight would otherwise score zero. It falls back to a
    // deliberately conservative rate: low enough that entering the real number always pays better
    // than leaving it blank, so the model never rewards under-logging.
    if(ratio <= 0) ratio = MISSING_WEIGHT_FRACTION;
    return amount * ratio * (ex.type === "time" ? XP_K.time : XP_K.reps);
  }

  const CATEGORY_LABEL = { STR:"Strength — Push, Pull, Press", AGI:"Agility — Speed & Power", VIT:"Vitality — Endurance & Core" };

  // Custom daily goal (base, at E-Gate) for an exercise, falling back to the default table.

  // ---------- date helpers ----------
  function todayStr(){
    const d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function addDays(dateStr, n){
    const d = new Date(dateStr+"T00:00:00");
    d.setDate(d.getDate()+n);
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function daysBetween(a,b){
    const da = new Date(a+"T00:00:00"), db = new Date(b+"T00:00:00");
    return Math.round((db-da)/86400000);
  }
  function fmtDate(dateStr){

  const GRACE_WINDOW_DAYS = 7;
  // Determines whether a streak survives the gap between lastLogDate and today.
  // Allows exactly one missed day, usable at most once per rolling 7-day window.
  function checkStreakGrace(lastLogDate, today){
    if(!lastLogDate) return {continued:false, usedGrace:false, missedDate:null};
    if(lastLogDate === today) return {continued:true, usedGrace:false, missedDate:null};
    const gap = daysBetween(lastLogDate, today);
    if(gap === 1) return {continued:true, usedGrace:false, missedDate:null};
    if(gap === 2){
      const missedDate = addDays(lastLogDate, 1);
      const lastGraceUse = state.grace && state.grace.lastUsedDate;
      const graceAvailable = !lastGraceUse || daysBetween(lastGraceUse, missedDate) >= GRACE_WINDOW_DAYS;
      if(graceAvailable) return {continued:true, usedGrace:true, missedDate};
    }
    return {continued:false, usedGrace:false, missedDate:null};
  }
  function isGraceAvailable(today){
    const lastGraceUse = state.grace && state.grace.lastUsedDate;
    return !lastGraceUse || daysBetween(lastGraceUse, today) >= GRACE_WINDOW_DAYS;
  }

  // ---------- job board ----------
  function todayWeekday(){ return new Date().getDay(); }

      const da = daysSinceLogged(lastMap[a.id]), db = daysSinceLogged(lastMap[b.id]);
      if(da===db) return 0;
      return db-da;
    });
    return pool.slice(0, count);
  }

  function generateBoard(excludeIds){

  // Replays log history through the same continuation + grace rules to find the longest streak ever reached.
  function computeLongestStreak(){
    const dates = Array.from(new Set((state.logs||[]).map(l=>l.date))).sort();
    if(dates.length===0) return 0;
    let streak = 1, longest = 1, graceLastUsed = null;
    for(let i=1;i<dates.length;i++){
      const prev = dates[i-1], curr = dates[i];
      const gap = daysBetween(prev, curr);
      if(gap === 1){
        streak += 1;

        const missed = addDays(prev, 1);

        streak = 1;

    }

  function mondayOf(dateStr){
    const d = new Date(dateStr+"T00:00:00");
    const offset = (d.getDay() + 6) % 7; // Mon=0 ... Sun=6
    return addDays(dateStr, -offset);
  }
  function seedFromString(str){
    let seed = 0;
    for(let i=0;i<str.length;i++){ seed = (seed*31 + str.charCodeAt(i)) >>> 0; }
    return seed;
  }
  // Total XP logged within the boss's Monday→Sunday window (computed live from logs).
  function computeWeeklyDamage(weekKey){
    const weekEnd = addDays(weekKey, 6);
    return (state.logs||[])
      .filter(l=> l.date >= weekKey && l.date <= weekEnd)
      .reduce((sum,l)=> sum + (l.totalXp||0), 0);
  }
  function avgRecentWeeklyXp(currentMonday){
    let total = 0, weeksWithData = 0;
    for(let k=1;k<=3;k++){
      const weekXp = computeWeeklyDamage(addDays(currentMonday, -7*k));
      if(weekXp > 0){ total += weekXp; weeksWithData++; }
    }
    return weeksWithData > 0 ? (total / weeksWithData) : 0;
  }
  function spawnWeeklyBoss(weekKey){
    const seed = seedFromString(weekKey);
    const category = BOSS_CATEGORIES[seed % BOSS_CATEGORIES.length];
    const pool = BOSS_POOLS[category];
    const name = pool.names[Math.floor(seed/7) % pool.names.length];
    const gate = state.gateRank || rankFor(state.level);
    const floor = BOSS_HP_FLOORS[gate] || BOSS_HP_FLOORS.E;
    const adaptive = Math.round((avgRecentWeeklyXp(weekKey) * BOSS_HP_MULTIPLIER) / 10) * 10;
    const hp = Math.max(floor, adaptive);
    return {
      weekKey, name, category, hp,
      spawnGate: gate,
      defeatedAt: null,
      bountyXp: Math.round((hp * BOSS_BOUNTY_PCT) / 5) * 5,
    };
  }
  // Spawns this week's boss if missing, archiving last week's outcome to the Boss Log first.
  function ensureWeeklyBoss(){
    const currentMonday = mondayOf(todayStr());
    if(state.weeklyBoss && state.weeklyBoss.weekKey === currentMonday) return;
    if(state.weeklyBoss){
      const old = state.weeklyBoss;
      state.bossHistory = state.bossHistory || [];
      state.bossHistory.push({
        weekKey: old.weekKey,
        name: old.name,
        category: old.category,
        hp: old.hp,
        dealt: Math.min(old.hp, computeWeeklyDamage(old.weekKey)),
        slain: !!old.defeatedAt,
      });
      if(state.bossHistory.length > 26){ state.bossHistory = state.bossHistory.slice(-26); }
    }
    state.weeklyBoss = spawnWeeklyBoss(currentMonday);
    saveState();
  }
  // Marks the boss slain and returns the bounty to award; 0 if no kill occurred.
  // Slays are honors — once defeated, later log edits never un-slay a boss.
  function processBossSlay(){
    const boss = state.weeklyBoss;
    if(!boss || boss.defeatedAt) return 0;
    if(computeWeeklyDamage(boss.weekKey) >= boss.hp){
      boss.defeatedAt = todayStr();
      state.counters = state.counters || {};
      state.counters.bossesSlain = (state.counters.bossesSlain||0) + 1;
      return boss.bountyXp;
    }
    return 0;
  }

  // ---------- penalty quest ----------
  // When a real streak (3+ days) breaks past the grace day, the System offers one
  // same-day trial: clear three exercises (one per category) at 1.5× their daily
  // goals before midnight to fully restore the lost streak. Offered at most once
  // per rolling 14 days; failure simply expires — no extra punishment.
  const PENALTY_MULTIPLIER = 1.5;
  const PENALTY_MIN_LOST_STREAK = 3;
  const PENALTY_COOLDOWN_DAYS = 14;

  function maybeOfferPenalty(lostStreak){
    if(lostStreak < PENALTY_MIN_LOST_STREAK) return;
    state.penalty = state.penalty || { lastOfferedDate:null, active:null };
    const today = todayStr();
    if(state.penalty.active && state.penalty.active.date === today) return;
    const last = state.penalty.lastOfferedDate;
    if(last && daysBetween(last, today) < PENALTY_COOLDOWN_DAYS) return;

    const gate = state.gateRank || rankFor(state.level);
    const lastMap = lastLoggedMap();
    const ids = [];
    const targets = {};
    ["STR","AGI","VIT"].forEach(cat=>{
      const picks = pickForCategory(cat, 1, [], lastMap);
      if(picks[0]){
        ids.push(picks[0].id);
        targets[picks[0].id] = Math.max(1, Math.round(gateScaledGoal(picks[0], gate) * PENALTY_MULTIPLIER));
      }
    });
    if(ids.length === 0) return;

    state.penalty.lastOfferedDate = today;
    state.penalty.active = { date: today, lostStreak, exerciseIds: ids, targets, status:"active" };
  }

  // Expires an unfinished trial once its day has passed. Failure is silent by design.
  function ensurePenaltyExpiry(){
    const p = state.penalty && state.penalty.active;
    if(p && p.status === "active" && p.date < todayStr()){
      state.penalty.active = null;
      saveState();
    }
  }

  // Checks whether today's trial is fully cleared; if so, restores the lost streak
  // (+1 for today) and returns the cleared trial. Must run after log entries merge.
  function processPenaltyClear(){
    const p = state.penalty && state.penalty.active;
    if(!p || p.status !== "active" || p.date !== todayStr()) return null;
    const allMet = p.exerciseIds.every(id=> todayTotalFor(id) >= p.targets[id]);
    if(!allMet) return null;
    p.status = "cleared";
    state.counters = state.counters || {};
    state.counters.penaltiesCleared = (state.counters.penaltiesCleared||0) + 1;
    state.streak = p.lostStreak + 1;
    return p;
  }

  function rerollBoard(){
    const exclude = state.board ? state.board.exerciseIds : [];
    state.board = generateBoard(exclude);
    acceptedContractIds = new Set();
    saveState();
    render();
  }

  function setGateRank(rank){
    if(RANK_ORDER.indexOf(rank) === -1) return;
    state.gateRank = rank;
    saveState();
    render();
  }

  function acceptContract(id){
    const ex = allExercises().find(e=>e.id===id);
    if(!ex) return;
    acceptedContractIds.add(id);
    render();
    // Daily goals are cumulative — select the exercise and focus the input so real sets get logged toward the goal.
    const sel = document.getElementById("exerciseSelect");
    const val = document.getElementById("setValueInput");
    if(sel && val){
      sel.value = id;
      val.placeholder = currentPlaceholder();
      val.focus();
      val.scrollIntoView({behavior:"smooth", block:"center"});
    }
  }

  let saveInFlight = false;
  let savePending = false;
  let lastSaveTime = 0;
  let consecutiveFailures = 0;
  const MIN_SAVE_INTERVAL = 600;
  const MAX_FAST_RETRIES = 4;
  let syncStatus = "idle"; // idle | saving | retrying | stalled

  function setSyncStatus(status){
    syncStatus = status;
    const textEl = document.getElementById("syncStatusText");
    const retryBtn = document.getElementById("retrySaveBtn");
    if(textEl){ textEl.textContent = SYNC_STATUS_TEXT[status] || ""; }
    const wrap = document.getElementById("syncStatus");
    if(wrap){ wrap.className = "sync-status " + status; }
    if(retryBtn){ retryBtn.style.display = status === "stalled" ? "inline-block" : "none"; }
  }

  function saveState(){
    savePending = true;
    return processSaveQueue();
  }

  function retrySaveNow(){
    consecutiveFailures = 0;
    savePending = true;
    processSaveQueue();
  }

  async function processSaveQueue(){
    if(saveInFlight) return;
    saveInFlight = true;
    while(savePending){
      savePending = false;
      setSyncStatus("saving");
      const wait = Math.max(0, MIN_SAVE_INTERVAL - (Date.now() - lastSaveTime));
      if(wait > 0) await new Promise(r=>setTimeout(r, wait));
      try{
        const result = await storageSet(STORAGE_KEY, JSON.stringify(state));
        if(!result){ throw new Error("Storage set returned no result"); }
        consecutiveFailures = 0;
        setSyncStatus("idle");
      }catch(err){
        consecutiveFailures++;
        console.error(`Save failed (attempt ${consecutiveFailures})`, err);
        savePending = true;
        if(consecutiveFailures > MAX_FAST_RETRIES){
          setSyncStatus("stalled");
          await new Promise(r=>setTimeout(r, 30000));
        } else {
          setSyncStatus("retrying");
          const backoff = Math.min(15000, 1500 * Math.pow(1.7, consecutiveFailures-1));
          await new Promise(r=>setTimeout(r, backoff));
        }
      }
      lastSaveTime = Date.now();
    }
    saveInFlight = false;
  }
  async function loadState(){
    try{
      const res = await storageGet(STORAGE_KEY);
      if(res && res.value){ return Object.assign(defaultState(), JSON.parse(res.value)); }
    }catch(err){ /* no existing data */ }
    return defaultState();
  }

  function checkStreakBreak(){
    if(state.lastLogDate){
      const today = todayStr();
      if(state.lastLogDate !== today){
        const check = checkStreakGrace(state.lastLogDate, today);
        if(!check.continued && state.streak !== 0){
          const lostStreak = state.streak;
          state.streak = 0;
          maybeOfferPenalty(lostStreak);
          saveState();
        }
      }
    }
  }

  function addXp(amount){
    state.xp += amount;
    let leveledUp = false;
    const oldRank = rankFor(state.level);
    while(state.xp >= xpToNext(state.level)){
      state.xp -= xpToNext(state.level);
      state.level += 1;
      leveledUp = true;
    }
    const newRank = rankFor(state.level);
    const rankedUp = newRank !== oldRank ? newRank : null;
    return {leveledUp, rankedUp};
  }

  function completeQuest(){
    if(builder.length === 0) return;
    const today = todayStr();
    const oldPoints = categoryPoints();
    const oldTiers = {STR:tierInfo(oldPoints.STR).tier, AGI:tierInfo(oldPoints.AGI).tier, VIT:tierInfo(oldPoints.VIT).tier};
    let baseXp = 0;
    const entries = builder.map(b=>{
      const xp = entryXp(b, b.sets, b.weights);
      baseXp += xp;
      return {id:b.id, name:b.name, category:b.category, type:b.type, sets:b.sets.slice(), weights:(b.weights||[]).slice(), xp};
    });

    // Capture pre-merge totals so we can detect daily-goal crossings below
    const prevTotals = {};
    builder.forEach(b=>{ prevTotals[b.id] = todayTotalFor(b.id); });

    let log = state.logs.find(l=>l.date===today);
    if(!log){ log = {date:today, entries:[], totalXp:0}; state.logs.push(log); }
    entries.forEach(e=>{
      const existing = log.entries.find(x=>x.id===e.id);
      if(existing){
        existing.sets = existing.sets.concat(e.sets);
        existing.weights = (existing.weights||[]).concat(e.weights||[]);
        existing.xp += e.xp;
      }
      else{ log.entries.push(e); }
    });

    // Daily-goal crossings: count each exercise that goes from below its gate-scaled goal to at/above it
    state.counters = state.counters || { goalsCleared:0, sGateGoalClears:0 };
    const activeGate = state.gateRank || rankFor(state.level);
    const uniqueIds = Array.from(new Set(builder.map(b=>b.id)));
    uniqueIds.forEach(id=>{
      const ex = allExercises().find(e=>e.id===id);
      if(!ex) return;
      const goal = gateScaledGoal(ex, activeGate);
      const now = todayTotalFor(id);
      if((prevTotals[id]||0) < goal && now >= goal){
        state.counters.goalsCleared = (state.counters.goalsCleared||0) + 1;
        if(activeGate === "S"){ state.counters.sGateGoalClears = (state.counters.sGateGoalClears||0) + 1; }
      }
    });

    let usedGraceToday = false;
    if(state.lastLogDate !== today){
      const check = checkStreakGrace(state.lastLogDate, today);
      // Break detected at log time (e.g. app stayed open past midnight) — offer the trial before resetting
      if(!check.continued && state.streak >= PENALTY_MIN_LOST_STREAK){ maybeOfferPenalty(state.streak); }
      state.streak = check.continued ? state.streak + 1 : 1;
      if(check.usedGrace){
        state.grace.lastUsedDate = check.missedDate;
        usedGraceToday = true;
      }
      state.lastLogDate = today;
    }

    // Penalty trial: check for the clear before computing the streak bonus, so the
    // quest that completes the trial immediately earns the restored streak's bonus.
    const clearedPenalty = processPenaltyClear();

    const bonusPct = Math.min(25, state.streak * 1);
    const bonusXp = Math.round(baseXp * bonusPct / 100);
    const totalXp = baseXp + bonusXp;
    log.totalXp += totalXp;

    // Weekly boss: damage is the quest's XP; check for the killing blow and award the bounty with this quest's XP.
    ensureWeeklyBoss();
    const boss = state.weeklyBoss;
    const bossWasAlive = boss && !boss.defeatedAt;
    const bounty = processBossSlay();
    const bossInfo = boss ? {
      active: bossWasAlive,
      slainNow: bounty > 0,
      name: boss.name,
      damage: totalXp,
      remaining: Math.max(0, boss.hp - computeWeeklyDamage(boss.weekKey)),
      bounty: bounty,
    } : null;

    const result = addXp(totalXp + bounty);
    const newPoints = categoryPoints();
    const tierUps = ["STR","AGI","VIT"].filter(cat=> tierInfo(newPoints[cat]).tier > oldTiers[cat])
      .map(cat=> ({cat, label: tierInfo(newPoints[cat]).label}));
    const newAchievements = checkAchievements();
    builder = [];
    saveState();
    render();
    if(result.leveledUp){ triggerLevelUpFlash(); }
    showSystemWindow(baseXp, result.leveledUp, result.rankedUp, tierUps, bonusPct, bonusXp, usedGraceToday, newAchievements, bossInfo, clearedPenalty ? state.streak : null);
  }

  // ---------- backdated logging ----------
  // Logs a quest for a past date instead of today. Deliberately simpler than completeQuest:
  // no streak bonus (computing "what your streak was on that historical date" is fuzzy and
  // easy to get wrong), no grace/penalty interaction, no goal-clear counters (those track a
  // live moment, not a retroactive one). After merging the entries, the full state (level,
  // XP, streak, lastLogDate) is rebuilt from the complete log history via recomputeFromLogs —
  // the same trusted mechanism history-deletion already uses — so nothing goes stale or
  // double-counted, and a backdated day slots into streak continuity exactly like it would
  // have if you'd logged it live.
  function completeBackdatedQuest(targetDate, entriesBuilder){
    if(!targetDate || entriesBuilder.length === 0) return null;
    const today = todayStr();
    if(targetDate >= today) return null; // this path is for the past only; today uses the normal flow

    const oldPoints = categoryPoints();
    const oldTiers = {STR:tierInfo(oldPoints.STR).tier, AGI:tierInfo(oldPoints.AGI).tier, VIT:tierInfo(oldPoints.VIT).tier};

    let baseXp = 0;
    const entries = entriesBuilder.map(b=>{
      const xp = entryXp(b, b.sets, b.weights);
      baseXp += xp;
      return {id:b.id, name:b.name, category:b.category, type:b.type, sets:b.sets.slice(), weights:(b.weights||[]).slice(), xp};
    });

    let log = state.logs.find(l=>l.date===targetDate);
    if(!log){ log = {date:targetDate, entries:[], totalXp:0}; state.logs.push(log); }
    entries.forEach(e=>{
      const existing = log.entries.find(x=>x.id===e.id);
      if(existing){
        existing.sets = existing.sets.concat(e.sets);
        existing.weights = (existing.weights||[]).concat(e.weights||[]);
        existing.xp += e.xp;
      }
      else{ log.entries.push(e); }
    });
    log.totalXp += baseXp;

    // Weekly boss damage still applies if the backdated date falls in the currently active
    // boss's week — computeWeeklyDamage is date-range based, not "today"-based, so this is safe.
    ensureWeeklyBoss();
    const boss = state.weeklyBoss;
    const bossWasAlive = boss && !boss.defeatedAt;
    const bounty = processBossSlay();
    const bossInfo = boss ? {
      active: bossWasAlive,
      slainNow: bounty > 0,
      name: boss.name,
      damage: baseXp,
      remaining: Math.max(0, boss.hp - computeWeeklyDamage(boss.weekKey)),
      bounty: bounty,
    } : null;

    const levelBefore = state.level;
    const rankBefore = rankFor(state.level);
    recomputeFromLogs(); // rebuilds level/xp/streak/lastLogDate/grace from the full log history
    if(bounty > 0){ addXp(bounty); } // applied after recompute, since recompute derives XP purely from log totals
    const leveledUp = state.level > levelBefore;
    const rankAfter = rankFor(state.level);
    const rankedUp = rankAfter !== rankBefore ? rankAfter : null;
    const newPoints = categoryPoints();
    const tierUps = ["STR","AGI","VIT"].filter(cat=> tierInfo(newPoints[cat]).tier > oldTiers[cat])
      .map(cat=> ({cat, label: tierInfo(newPoints[cat]).label}));
    const newAchievements = checkAchievements();
    saveState();
    render();
    if(leveledUp){ triggerLevelUpFlash(); }
    return { targetDate, baseXp, bounty, tierUps, newAchievements, bossInfo, leveledUp, rankedUp, newLevel: state.level };
  }

  // ---------- render ----------
  const app = document.getElementById("app");

    ensureBoard();
    ensureWeeklyBoss();
    ensurePenaltyExpiry();
    const rank = rankFor(state.level);
    const rankColor = RANK_COLORS[rank];
    const need = xpToNext(state.level);
    const pct = Math.min(100, Math.round((state.xp/need)*100));
    const statPoints = categoryPoints();
    const today = todayStr();
    const loggedToday = state.logs.find(l=>l.date===today);

    app.innerHTML = `

          </div>

            <span class="hunter-name-display">${state.hunterName ? escapeHtml(state.hunterName) : "Unnamed Hunter"}</span>

          </span>
        </div>

      <div class="panel">
        <div class="eyebrow"><span class="dot"></span>PLAYER STATUS</div>

            <div class="level-row">
              <span class="lv">LEVEL <span id="levelNumDisplay">${state.level}</span></span>${infoBtn("level")}
              <span class="rank-label">${rank}-RANK HUNTER</span>${infoBtn("rank")}
            </div>
            <div class="xp-bar-track"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
            <div class="xp-text">XP <span id="xpNumDisplay">${state.xp}</span> / ${need}${infoBtn("xp")}</div>
          </div>
          <div class="streak-block">
            <div class="streak-num" id="streakNumDisplay">${state.streak}</div>
            <div class="streak-label">HUNT STREAK${infoBtn("streak")}</div>
            <div class="streak-bonus">+${Math.min(25, state.streak)}% XP</div>
            <div class="grace-status">${isGraceAvailable(today) ? "🛡 Rest Day Ready" : `🛡 Recharges in ${GRACE_WINDOW_DAYS - daysBetween(state.grace.lastUsedDate, today)}d`}</div>
          </div>
        </div>

        <div class="substats">
          ${["STR","AGI","VIT"].map(cat=>{
            const val = statPoints[cat]||0;
            const info = tierInfo(val);

      ${renderPenaltyQuest()}

        <div class="eyebrow"><span class="dot"></span>GUILD JOB BOARD</div>
        ${renderJobBoard()}
        <button class="toggle-custom" id="toggleRoster" style="margin-top:14px;">${rosterFormOpen ? "− Hide guild roster" : "⚙ Edit guild roster"}</button>

          ${renderRosterForm()}

    bindEvents();

  function renderExerciseOptions(){
    const groups = {STR:[], AGI:[], VIT:[]};
    visibleExercises().forEach(ex=>groups[ex.category].push(ex));
    return Object.keys(groups).map(cat=>{
      if(groups[cat].length===0) return "";
      return `<optgroup label="${cat}">${groups[cat].map(ex=>`<option value="${ex.id}">${ex.name}${ex.type==="time" ? " (sec)" : ex.type==="minutes" ? " (min)" : ""}</option>`).join("")}</optgroup>`;
    }).join("");
  }

  function renderExerciseManager(){
    const hidden = state.hiddenExerciseIds || [];
    const weights = state.exerciseWeights || {};
    const groups = {STR:[], AGI:[], VIT:[]};
    allExercises().forEach(ex=>groups[ex.category].push(ex));
    const rows = Object.keys(groups).map(cat=>{
      if(groups[cat].length===0) return "";
      return `<div class="ex-mgr-group">
        <div class="ex-mgr-cat">${cat}</div>
        ${groups[cat].map(ex=>{
          const isHidden = hidden.indexOf(ex.id)!==-1;
          const unit = ex.type==="time" ? "sec" : ex.type==="minutes" ? "min" : "reps";
          const customGoal = state.dailyGoals && state.dailyGoals[ex.id];
          const defaultGoal = (GATE_TARGETS[ex.type] || GATE_TARGETS.reps).E;
          const hasWeight = !!weights[ex.id];
          const isCustom = ex.id.startsWith("c_");
          const isCardio = ex.type === "minutes";
          const customLoadPct = (state.exerciseLoads && typeof state.exerciseLoads[ex.id] === "number")
            ? Math.round(state.exerciseLoads[ex.id] * 100) : "";
          const customMet = (state.exerciseMets && typeof state.exerciseMets[ex.id] === "number")
            ? state.exerciseMets[ex.id] : "";
          const rateLabel = `Currently ${Math.round(baseRateFor(ex)*100)/100} XP per ${unit === "sec" ? "second" : unit === "min" ? "minute" : "rep"}`;
          return `<div class="ex-mgr-row ${isHidden?"is-hidden":""}">
            <span class="ex-mgr-name">${escapeHtml(ex.name)}</span>
            <span class="ex-mgr-actions">
              <button class="btn small ghost ex-mgr-edit-btn" data-edit-exercise="${ex.id}" title="Edit exercise">✎</button>
              <input type="number" min="1" class="ex-mgr-goal-input" data-goal-exercise="${ex.id}" placeholder="${defaultGoal}" value="${customGoal || ""}" title="Daily goal (${unit})" />
              <span class="ex-mgr-unit">${unit}/day</span>
              ${isCardio
                ? `<input type="number" min="1" max="25" step="0.5" class="ex-mgr-load-input" data-load-exercise="${ex.id}" data-load-kind="met" placeholder="${Math.round(metFor(ex)*10)/10}" value="${customMet || ""}" title="Intensity in METs — walking ≈ 3.5, disc golf ≈ 4.8, jogging ≈ 7, hard running ≈ 11" />
                   <span class="ex-mgr-unit" title="${rateLabel}">METs</span>`
                : `<input type="number" min="0" max="300" step="1" class="ex-mgr-load-input" data-load-exercise="${ex.id}" data-load-kind="bw" placeholder="${Math.round(loadFractionFor(ex)*100)}" value="${customLoadPct || ""}" title="Percent of your bodyweight moved per ${unit === "sec" ? "second held" : "rep"} — this is what sets the exercise's XP rate" />
                   <span class="ex-mgr-unit" title="${rateLabel}">% BW</span>`}
              <label class="ex-mgr-weight-toggle" title="Track weight for this exercise">
                <input type="checkbox" data-weight-toggle="${ex.id}" ${hasWeight ? "checked" : ""} /> <span class="ex-mgr-weight-label">⚖</span>
              </label>
              <button class="btn small ${isHidden?"":"ghost"}" data-toggle-exercise="${ex.id}">${isHidden?"Restore":"Remove"}</button>
            </span>
          </div>`;
        }).join("")}
      </div>`;
    }).join("");
    return rows + `<div class="ex-mgr-note"><b>% BW</b> is what drives XP: the share of your bodyweight the movement actually moves (push-up ≈ 64%, squat ≈ 45%, pull-up ≈ 100%). Any weight you log for a set is added on top, so 10 reps at 100 lbs earns exactly double 10 reps at 50 lbs. Cardio uses <b>METs</b> instead — intensity per minute, where walking ≈ 3.5 and jogging ≈ 7. Hover a rate to see the XP it produces, and raise a number if an exercise feels harder for you than the default assumes. Set your bodyweight in ⚙ Settings. ✎ Edit = rename or change category. ⚖ Weight = track load (lbs/kg) when logging sets. Daily Goal is your E-Gate baseline — the Job Board scales it up with your Gate Rank. Leave blank to use the default. Removed exercises hide from the dropdown/Job Board but past logs are untouched.</div>`;
  }

  function setDailyGoal(id, value){
    state.dailyGoals = state.dailyGoals || {};
    const num = parseInt(value, 10);
    if(!num || num <= 0){ delete state.dailyGoals[id]; }
    else{ state.dailyGoals[id] = num; }
    saveState();
  }

  // Load overrides only affect XP earned from here on — past logs keep the score they were
  // given, so tweaking a number never silently rewrites your history. Use "Recalculate XP"
  // in Settings if you do want the change applied backward.
  function setLoadFraction(id, value){
    state.exerciseLoads = state.exerciseLoads || {};
    const num = parseFloat(value);
    if(isNaN(num) || num < 0){ delete state.exerciseLoads[id]; }
    else{ state.exerciseLoads[id] = Math.min(3, num / 100); }
    saveState();
  }
  function setMet(id, value){
    state.exerciseMets = state.exerciseMets || {};
    const num = parseFloat(value);
    if(isNaN(num) || num <= 0){ delete state.exerciseMets[id]; }
    else{ state.exerciseMets[id] = Math.min(25, num); }
    saveState();
  }

  function toggleExerciseWeight(id, enabled){
    state.exerciseWeights = state.exerciseWeights || {};
    if(enabled){ state.exerciseWeights[id] = true; }
    else{ delete state.exerciseWeights[id]; }
    saveState();
  }

  function showEditExerciseOverlay(id){
    const ex = allExercises().find(e=>e.id===id);
    if(!ex) return;
    const isDefault = !id.startsWith("c_");
    // For default exercises we store overrides in state.exerciseOverrides
    const overrides = state.exerciseOverrides || {};
    const currentName = (overrides[id] && overrides[id].name) || ex.name;
    const currentCategory = (overrides[id] && overrides[id].category) || ex.category;

    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="sys-window" style="max-width:380px;">
        <div class="tag">◆ EDIT EXERCISE ◆</div>
        <h3>${escapeHtml(ex.name)}</h3>
        <div style="text-align:left;">
          <label style="display:block; font-size:11px; color:var(--text-dim2); letter-spacing:1px; margin-bottom:6px;">NAME</label>
          <input type="text" id="editExName" maxlength="40" value="${escapeHtml(currentName)}" class="settings-input" style="margin-bottom:14px;" />
          <label style="display:block; font-size:11px; color:var(--text-dim2); letter-spacing:1px; margin-bottom:6px;">CATEGORY</label>
          <select id="editExCategory" class="settings-input" style="margin-bottom:14px;">
            <option value="STR" ${currentCategory==="STR"?"selected":""}>STR</option>
            <option value="AGI" ${currentCategory==="AGI"?"selected":""}>AGI</option>
            <option value="VIT" ${currentCategory==="VIT"?"selected":""}>VIT</option>
          </select>
          <div style="font-size:11px; color:var(--text-dim2); line-height:1.4;">Changes apply going forward. Past log entries keep their original name and category for historical accuracy.</div>
        </div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:18px;">
          <button class="btn ghost" id="cancelEditEx">Cancel</button>
          <button class="btn primary" id="saveEditEx">Save</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=>overlay.classList.add("show"));

    function close(){
      overlay.classList.remove("show");
      setTimeout(()=>overlay.remove(), 250);
    }
    overlay.querySelector("#cancelEditEx").addEventListener("click", close);
    overlay.addEventListener("click", (e)=>{ if(e.target===overlay) close(); });

    overlay.querySelector("#saveEditEx").addEventListener("click", ()=>{
      const newName = overlay.querySelector("#editExName").value.trim();
      const newCategory = overlay.querySelector("#editExCategory").value;
      if(!newName) return;

      if(isDefault){
        state.exerciseOverrides = state.exerciseOverrides || {};
        state.exerciseOverrides[id] = { name: newName, category: newCategory };
      } else {
        const custom = (state.customExercises||[]).find(e=>e.id===id);
        if(custom){ custom.name = newName; custom.category = newCategory; }
      }
      saveState();
      close();
      render();
    });

    overlay.querySelector("#editExName").focus();
    overlay.querySelector("#editExName").addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); overlay.querySelector("#saveEditEx").click(); } });
  }

  function toggleExerciseVisibility(id){
    state.hiddenExerciseIds = state.hiddenExerciseIds || [];
    const idx = state.hiddenExerciseIds.indexOf(id);
    if(idx===-1){ state.hiddenExerciseIds.push(id); }
    else{ state.hiddenExerciseIds.splice(idx,1); }
    saveState();
    render();
  }

  function currentPlaceholder(){
    const sel = document.getElementById("exerciseSelect");
    const id = sel ? sel.value : allExercises()[0].id;
    const ex = allExercises().find(e=>e.id===id) || allExercises()[0];
    if(!ex) return "reps";
    const unit = ex.type === "time" ? "sec" : ex.type === "minutes" ? "min" : "reps";
    const goal = baseGoalFor(ex);
    return goal ? `${goal} ${unit} (goal)` : unit;
  }
  function showWeightInput(){
    const sel = document.getElementById("exerciseSelect");
    const id = sel ? sel.value : allExercises()[0].id;
    return !!(state.exerciseWeights && state.exerciseWeights[id]);
  }
  function updateWeightVisibility(){
    const weightInput = document.getElementById("setWeightInput");
    if(weightInput){
      if(showWeightInput()){ weightInput.classList.remove("hidden"); }
      else{ weightInput.classList.add("hidden"); weightInput.value = ""; }
    }
  }

  function renderBuilderPills(){
    if(builder.length===0) return `<div class="empty-note">No exercises added to today's quest yet.</div>`;
    return builder.map((b,i)=>{
      const unitSuffix = b.type==="time" ? "s" : b.type==="minutes" ? "m" : "";
      const setsDisplay = b.sets.map((s,j)=>{
        const w = b.weights && b.weights[j];
        return w ? `${s}${unitSuffix}@${w}` : `${s}${unitSuffix}`;
      }).join(" · ");
      return `
      <div class="pill-row">
        <span class="name">${b.name}</span>
        <span class="cat">${b.category}</span>
        <span class="sets">${setsDisplay}</span>

      </div>
    `;
    }).join("");

  // ---------- workout templates ----------
  function getTemplates(){ return state.templates || []; }

  function saveTemplate(name, exercises){
    state.templates = state.templates || [];
    const id = "wt_" + name.toLowerCase().replace(/[^a-z0-9]+/g,"-") + "_" + Date.now().toString(36);
    const template = { id, name, exercises, createdAt: todayStr(), timesLogged: 0 };
    state.templates.push(template);
    state.counters = state.counters || {};
    state.counters.templatesSaved = (state.counters.templatesSaved||0) + 1;
    checkAchievements();
    saveState();
    return template;
  }

  function updateTemplate(id, name, exercises){
    const t = (state.templates||[]).find(t=>t.id===id);
    if(!t) return;
    t.name = name;
    t.exercises = exercises;
    saveState();
  }

  function deleteTemplate(id){
    state.templates = (state.templates||[]).filter(t=>t.id!==id);
    saveState();
  }

  function saveQuestAsTemplate(name){
    // Capture whatever was just logged today (from the most recent log entry)
    const todayLog = (state.logs||[]).find(l=>l.date===todayStr());
    if(!todayLog || !todayLog.entries.length) return null;
    const exercises = todayLog.entries.map(e=>({
      id: e.id,
      sets: e.sets.slice(),
      weights: (e.weights||[]).slice(),
    }));
    return saveTemplate(name, exercises);
  }

  function loadTemplateIntoBuilder(templateId){
    const t = (state.templates||[]).find(t=>t.id===templateId);
    if(!t) return;
    t.exercises.forEach(te=>{
      const ex = allExercises().find(e=>e.id===te.id);
      if(!ex) return; // skip hidden/deleted exercises
      if((state.hiddenExerciseIds||[]).indexOf(te.id)!==-1) return;
      let entry = builder.find(b=>b.id===te.id);
      if(!entry){
        entry = {id:ex.id, name:ex.name, category:ex.category, type:ex.type, sets:[], weights:[]};
        builder.push(entry);
      }
      // Exercises with saved sets get pre-filled; blank ones are skipped in load mode too
      // (they're just included in the template as placeholders for editing)
      if(te.sets && te.sets.length > 0){
        entry.sets = entry.sets.concat(te.sets);
        entry.weights = (entry.weights||[]).concat(te.weights||[]);
      }
    });
    render();
  }

  function quickLogTemplate(templateId){
    const t = (state.templates||[]).find(t=>t.id===templateId);
    if(!t) return;
    // Build entries from only the exercises that have saved sets (skip blanks)
    const validEntries = [];
    t.exercises.forEach(te=>{
      if(!te.sets || te.sets.length === 0) return;
      const ex = allExercises().find(e=>e.id===te.id);
      if(!ex) return;
      if((state.hiddenExerciseIds||[]).indexOf(te.id)!==-1) return;
      validEntries.push({id:ex.id, name:ex.name, category:ex.category, type:ex.type, sets:te.sets.slice(), weights:(te.weights||[]).slice()});
    });
    if(validEntries.length === 0) return;

    // Show confirmation with full exercise/set detail
    const detailLines = validEntries.map(e=>{
      const unitSuffix = e.type==="time"?"s":e.type==="minutes"?"m":"";
      const setsStr = e.sets.map((s,j)=>{
        const w = e.weights && e.weights[j];
        return w ? `${s}${unitSuffix}@${w}` : `${s}${unitSuffix}`;
      }).join(", ");
      return `<b>${escapeHtml(e.name)}</b>: ${setsStr}`;
    }).join("<br>");
    const totalSets = validEntries.reduce((sum,e)=>sum+e.sets.length, 0);

    showConfirmOverlay(
      `<div style="text-align:left; margin-bottom:10px;"><b>Quick Log "${escapeHtml(t.name)}"</b> — ${validEntries.length} exercise${validEntries.length===1?"":"s"}, ${totalSets} set${totalSets===1?"":"s"}:</div><div style="text-align:left; font-size:12px; line-height:1.6; max-height:200px; overflow-y:auto;">${detailLines}</div>`,
      ()=>{
        // Temporarily set builder to the template's entries and fire completeQuest
        builder = validEntries;
        t.timesLogged = (t.timesLogged||0) + 1;
        state.counters = state.counters || {};
        state.counters.quickLogs = (state.counters.quickLogs||0) + 1;
        completeQuest();
      }
    );
  }

  function renderTemplateList(){
    const templates = getTemplates();
    if(templates.length === 0) return "";
    return `
      <div class="template-picker">
        <div class="builder-row">
          <select id="templateSelect">

        </div>
      </div>
    `;

      <div class="sys-window" style="max-width:440px;">

        <h3>SAVE TODAY'S QUEST</h3>
        <div style="text-align:left;">

          <label style="display:block; font-size:11px; color:var(--text-dim2); letter-spacing:1px; margin-bottom:6px;">TEMPLATE NAME</label>
          <input type="text" id="templateNameInput" maxlength="30" placeholder="e.g. Push Day, Morning Circuit" class="settings-input" />
        </div>

        </div>
      </div>

  function showEditTemplateOverlay(templateId){

    const overlay = document.createElement("div");
    overlay.className = "overlay";

    function renderEditPills(){
      if(editExercises.length === 0) return `<div class="empty-note">${isCreate ? "Add exercises below to build your template." : "No exercises in this template."}</div>`;
      return editExercises.map((te, ti)=>{
        const ex = allExercises().find(e=>e.id===te.id);
        const name = ex ? ex.name : te.id;
        const unitSuffix = ex ? (ex.type==="time"?"s":ex.type==="minutes"?"m":"") : "";

        }).join(" · ");
        return `

    function refreshOverlay(){
      const heading = isCreate ? "CREATE TEMPLATE" : "EDIT TEMPLATE";
      const saveLabel = isCreate ? "Create Template" : "Save Changes";
      overlay.innerHTML = `
        <div class="sys-window card-window" style="max-width:520px;">
          <div class="tag">◆ ${heading} ◆</div>
          <h3>${heading}</h3>
          <div style="text-align:left;">

            <button class="btn ghost" id="cancelEditTemplate">Cancel</button>
            <button class="btn primary" id="saveEditTemplate">${saveLabel}</button>
          </div>
        </div>
      `;
      bindEditEvents();

    function bindEditEvents(){
      const exSelect = overlay.querySelector("#editTemplateExSelect");
      const valInput = overlay.querySelector("#editTemplateValInput");
      const weightInput = overlay.querySelector("#editTemplateWeightInput");

      function syncExerciseFields(){
        const ex = allExercises().find(e=>e.id===exSelect.value);
        const unit = ex ? (ex.type==="time"?"sec":ex.type==="minutes"?"min":"reps") : "reps";
        const goal = ex ? baseGoalFor(ex) : "";
        valInput.placeholder = goal ? `${goal} ${unit} (goal)` : unit;
        const hasWeight = !!(state.exerciseWeights && state.exerciseWeights[exSelect.value]);
        if(hasWeight){ weightInput.classList.remove("hidden"); }
        else{ weightInput.classList.add("hidden"); weightInput.value = ""; }
      }

      if(exSelect){
        exSelect.addEventListener("change", syncExerciseFields);
        syncExerciseFields(); // set initial state for whichever exercise is selected on open
      }

      overlay.querySelector("#editTemplateAddSet").addEventListener("click", ()=>{
        const id = exSelect.value;
        const ex = allExercises().find(e=>e.id===id);
        const raw = parseInt(valInput.value, 10);
        const val = (raw && raw > 0) ? raw : (ex ? baseGoalFor(ex) : 0);
        if(!ex || !val || val<=0){ valInput.focus(); return; }
        let entry = editExercises.find(e=>e.id===id);
        if(!entry){ entry = {id, sets:[], weights:[]}; editExercises.push(entry); }
        if(!entry.weights) entry.weights = [];
        entry.sets.push(val);
        const w = parseFloat(weightInput.value);
        entry.weights.push(w && w > 0 ? w : null);
        valInput.value = "";
        weightInput.value = "";
        overlay.querySelector("#editTemplatePills").innerHTML = renderEditPills();
        bindRemoveButtons();
        valInput.focus();
      });
      valInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); overlay.querySelector("#editTemplateAddSet").click(); } });
      weightInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); overlay.querySelector("#editTemplateAddSet").click(); } });

      bindRemoveButtons();

      overlay.querySelector("#saveEditTemplate").addEventListener("click", ()=>{
        const newName = overlay.querySelector("#editTemplateName").value.trim();
        if(!newName){ overlay.querySelector("#editTemplateName").focus(); return; }
        if(isCreate && editExercises.length === 0){ return; }
        editName = newName;
        if(isCreate){
          saveTemplate(editName, editExercises);
        } else {
          updateTemplate(t.id, editName, editExercises);
        }
        close();
        render();
      });
      overlay.querySelector("#cancelEditTemplate").addEventListener("click", ()=>{
        close();
        showManageTemplatesOverlay(); // return to the list
      });
      overlay.addEventListener("click", (e)=>{ if(e.target===overlay){ close(); showManageTemplatesOverlay(); } });
    }

    function bindRemoveButtons(){
      overlay.querySelectorAll("[data-remove-tedit]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          editExercises.splice(parseInt(btn.dataset.removeTedit, 10), 1);
          overlay.querySelector("#editTemplatePills").innerHTML = renderEditPills();
          bindRemoveButtons();
        });
      });
    }

    function close(){
      overlay.classList.remove("show");
      setTimeout(()=>overlay.remove(), 250);
    }

    document.body.appendChild(overlay);
    requestAnimationFrame(()=>overlay.classList.add("show"));
    refreshOverlay();
  }

      const ex = allExercises().find(e=>e.id===id);

      const target = p.targets[id];

      const met = done >= target;

      const displayPct = pct > 0 ? Math.max(pct, 3) : 0;

        <div class="eyebrow penalty-eyebrow"><span class="dot penalty-dot"></span>PENALTY QUEST${infoBtn("penalty")}</div>

  function renderProgressChart(){
    if(!selectedChartId) return `<div class="no-data">Log a quest to start tracking progress.</div>`;
    const ex = allExercises().find(e=>e.id===selectedChartId);
    if(!ex) return `<div class="no-data">Log a quest to start tracking progress.</div>`;

    const unitLabel = ex.type==="time" ? "Seconds" : ex.type==="minutes" ? "Minutes" : "Reps";

    const points = [];
    (state.logs||[]).slice().sort((a,b)=>a.date<b.date?-1:1).forEach(l=>{
      const entry = l.entries.find(e=>e.id===selectedChartId);
      if(entry){ points.push({date:l.date, value: entry.sets.reduce((a,c)=>a+c,0)}); }
    });
    if(points.length===0) return `<div class="no-data">No entries logged for ${ex.name} yet.</div>`;
    const recent = points.slice(-14);

    const w = 560, h = 150, padL = 34, padR = 10, padT = 14, padB = 22;
    const maxVal = Math.max(...recent.map(p=>p.value), 1);
    const stepX = recent.length>1 ? (w-padL-padR)/(recent.length-1) : 0;
    const coords = recent.map((p,i)=>{
      const x = padL + i*stepX;
      const y = padT + (h-padT-padB) * (1 - p.value/maxVal);
      return {x,y,...p};
    });
    const linePath = coords.map((c,i)=> (i===0?"M":"L") + c.x.toFixed(1) + " " + c.y.toFixed(1)).join(" ");
    const areaPath = linePath + ` L${coords[coords.length-1].x.toFixed(1)} ${h-padB} L${coords[0].x.toFixed(1)} ${h-padB} Z`;

    const gridLines = [0,0.5,1].map(f=>{
      const y = padT + (h-padT-padB)*f;
      return `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
    }).join("");

    const yTicks = [
      {v: maxVal, y: padT},
      {v: Math.round(maxVal/2), y: padT + (h-padT-padB)*0.5},
      {v: 0, y: h-padB},
    ].map(t=>`<text x="${padL-6}" y="${t.y+3}" fill="var(--text-dim2)" font-size="9" text-anchor="end" font-family="JetBrains Mono, monospace">${t.v}</text>`).join("");

    const labels = coords.filter((_,i)=> i===0 || i===coords.length-1 || i===Math.floor(coords.length/2))
      .map(c=>`<text x="${c.x}" y="${h-4}" fill="var(--text-dim2)" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">${fmtDate(c.date)}</text>`).join("");

    const dots = coords.map(c=>`<circle cx="${c.x}" cy="${c.y}" r="3" fill="#4fc3f7"><title>${fmtDate(c.date)}: ${c.value}</title></circle>`).join("");

    return `
      <div class="chart-caption">Y-axis: total ${unitLabel.toLowerCase()} of ${ex.name} logged per day &nbsp;·&nbsp; X-axis: date (last ${recent.length} logged session${recent.length===1?"":"s"})</div>
      <svg class="progress-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${gridLines}
        <path d="${areaPath}" fill="url(#areaGrad)" stroke="none"/>
        <path d="${linePath}" fill="none" stroke="#4fc3f7" stroke-width="2"/>
        ${yTicks}
        ${dots}
        ${labels}
      </svg>
    `;
  }

  // Removes an entire logged day and unwinds its effect on Level/XP, streak, and stats
  // by recomputing everything from the remaining log history.
  function recomputeFromLogs(){
    const sorted = state.logs.slice().sort((a,b)=> a.date<b.date?-1:1);

    const totalXp = sorted.reduce((sum,l)=> sum+(l.totalXp||0), 0);
    state.level = 1;
    state.xp = totalXp;
    while(state.xp >= xpToNext(state.level)){
      state.xp -= xpToNext(state.level);
      state.level += 1;
    }

    if(sorted.length === 0){
      state.streak = 0;
      state.lastLogDate = null;
      state.grace.lastUsedDate = null;
    } else {
      let streak = 1;
      let graceLastUsed = null;
      for(let i=1;i<sorted.length;i++){
        const prev = sorted[i-1].date, curr = sorted[i].date;
        const gap = daysBetween(prev, curr);
        if(gap === 1){
          streak += 1;
        } else if(gap === 2){
          const missed = addDays(prev, 1);
          const graceAvailable = !graceLastUsed || daysBetween(graceLastUsed, missed) >= GRACE_WINDOW_DAYS;
          if(graceAvailable){ streak += 1; graceLastUsed = missed; }
          else { streak = 1; }
        } else {
          streak = 1;
        }
      }
      state.streak = streak;
      state.lastLogDate = sorted[sorted.length-1].date;
      state.grace.lastUsedDate = graceLastUsed;
    }
    checkStreakBreak();
  }

  // Rescores every logged entry under the current effort model and rebuilds level/XP from it.
  // Each day's streak bonus is preserved proportionally: the old ratio of totalXp to the sum of
  // its entries is re-applied, so a day logged on a +12% streak keeps that +12% after rescoring.
  function recomputeAllLogXp(){
    (state.logs||[]).forEach(log=>{
      const oldBase = (log.entries||[]).reduce((a,e)=> a + (e.xp||0), 0);
      const bonusFactor = oldBase > 0 ? (log.totalXp||oldBase) / oldBase : 1;
      let newBase = 0;
      (log.entries||[]).forEach(e=>{
        e.xp = entryXp(e, e.sets, e.weights);
        newBase += e.xp;
      });
      log.totalXp = Math.round(newBase * bonusFactor);
    });
    recomputeFromLogs();
  }

  function removeLogEntry(date){
    const log = state.logs.find(l=>l.date===date);
    if(!log) return;
    const summary = log.entries.map(e=>e.name).join(", ") || "this workout";
    showConfirmOverlay(`Remove ${fmtDate(date)} (${summary})? This will also adjust your XP, level, and streak to reflect the removal.`, ()=>{
      state.logs = state.logs.filter(l=>l.date!==date);
      recomputeFromLogs();
      saveState();
      render();
    });
  }

    let top = rect.bottom + 8;
    popover.style.left = left + "px";
    popover.style.top = top + "px";
    requestAnimationFrame(()=>{

      if(pRect.bottom > vh - 12){

  // ---------- flourish: number count-up + level-up flash ----------
  let displayedValues = { level:0, xp:0, streak:0 };
  function prefersReducedMotion(){
    return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  }
  function animateNumberEl(el, from, to, duration){
    if(!el) return;
    if(from === to || prefersReducedMotion()){ el.textContent = to; return; }
    const start = performance.now();
    function step(now){
      const t = Math.min(1, (now-start)/duration);
      const eased = 1 - Math.pow(1-t, 3);
      el.textContent = Math.round(from + (to-from)*eased);
      if(t < 1) requestAnimationFrame(step);
      else el.textContent = to;
    }
    requestAnimationFrame(step);
  }
  function animateStatNumbers(){
    animateNumberEl(document.getElementById("levelNumDisplay"), displayedValues.level, state.level, 550);
    animateNumberEl(document.getElementById("xpNumDisplay"), displayedValues.xp, state.xp, 550);
