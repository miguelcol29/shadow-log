  // ---------- Guild Member Card ----------
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  // Reads an image file, center-crops it to a square, and returns a small JPEG data URL.
  function resizeImageToDataUrl(file, size){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          const side = Math.min(img.width, img.height);
          const sx = (img.width - side)/2, sy = (img.height - side)/2;
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
          resolve(canvas.toDataURL("image/jpeg", 0.85));
        };
        img.onerror = ()=>reject(new Error("Could not load image"));
        img.src = e.target.result;
      };
      reader.onerror = ()=>reject(new Error("Could not read file"));
      reader.readAsDataURL(file);
    });
  }
  function loadImage(src){
    return new Promise((resolve)=>{
      if(!src){ resolve(null); return; }
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = ()=>resolve(null);
      img.src = src;
    });
  }
  function shadeColor(hex, percent){
    const num = parseInt(hex.replace("#",""), 16);
    let r = (num >> 16) + Math.round(255*(percent/100));
    let g = ((num >> 8) & 0x00FF) + Math.round(255*(percent/100));
    let b = (num & 0x0000FF) + Math.round(255*(percent/100));
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return "#" + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
  }
  function roundedRect(ctx,x,y,w,h,r){
    w = Math.max(w, 0.001); h = Math.max(h, 0.001);
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function cutCornerPath(ctx,x,y,w,h,cut){
    ctx.beginPath();
    ctx.moveTo(x+cut,y);
    ctx.lineTo(x+w,y);
    ctx.lineTo(x+w,y+h-cut);
    ctx.lineTo(x+w-cut,y+h);
    ctx.lineTo(x,y+h);
    ctx.lineTo(x,y+cut);
    ctx.closePath();
  }
  function topLeftCutPath(ctx,x,y,w,h,cut){
    ctx.beginPath();
    ctx.moveTo(x+cut,y);
    ctx.lineTo(x+w,y);
    ctx.lineTo(x+w,y+h);
    ctx.lineTo(x,y+h);
    ctx.lineTo(x,y+cut);
    ctx.closePath();
  }
  // Draws img into the target box like CSS object-fit:cover (center-cropped, no distortion).
  function drawImageCover(ctx, img, x, y, w, h){
    const imgRatio = img.width/img.height, boxRatio = w/h;
    let sx, sy, sw, sh;
    if(imgRatio > boxRatio){
      sh = img.height; sw = sh*boxRatio; sx = (img.width-sw)/2; sy = 0;
    } else {
      sw = img.width; sh = sw/boxRatio; sx = 0; sy = (img.height-sh)/2;
    }
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  }
  // Deterministic decorative barcode, seeded from the hunter ID so it's stable, not random per render.
  function drawBarcode(ctx, x, y, w, h, seedStr, color){
    let seed = 0;
    for(let i=0;i<seedStr.length;i++){ seed = (seed*31 + seedStr.charCodeAt(i)) >>> 0; }
    function rand(){ seed = (seed*1103515245 + 12345) >>> 0; return (seed % 1000)/1000; }
    ctx.fillStyle = color;
    let cx = x;
    while(cx < x+w){
      const bw = 1 + rand()*3;
      if(rand() > 0.35){ ctx.fillRect(cx, y, bw, h); }
      cx += bw + 1 + rand()*2;
    }
  }

  function renderGuildCard(canvas, avatarImg){
    const ctx = canvas.getContext("2d");
    const scale = canvas.width / 1000;
    ctx.save();
    ctx.scale(scale, scale);
    const W = 1000, H = 600;
    ctx.clearRect(0,0,W,H);

    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0, "#0d1530");
    bg.addColorStop(1, "#05070f");
    ctx.fillStyle = bg;
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.fill();

    const rank = rankFor(state.level);
    const rankColor = RANK_COLORS[rank];

    const glow = ctx.createRadialGradient(W*0.5,0,50, W*0.5,0,650);
    glow.addColorStop(0, "rgba(79,195,247,0.14)");
    glow.addColorStop(1, "rgba(79,195,247,0)");
    ctx.fillStyle = glow;
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.fill();

    ctx.save();
    ctx.strokeStyle = rankColor;
    ctx.lineWidth = 3;
    ctx.shadowColor = rankColor;
    ctx.shadowBlur = 24;
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.stroke();
    ctx.restore();

    // Clip everything else to the card's own cut-corner shape so nothing bleeds into the corner notches
    ctx.save();
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.clip();

    // Solid rank-colored accent strip along the top edge — immediate rank read at a glance
    ctx.fillStyle = rankColor;
    ctx.fillRect(8, 8, W-16, 6);

    // ---- Photo panel (left, full-bleed, dominant, untouched by rank UI) ----
    const photoX=8, photoY=14, photoW=330, photoH=H-22;
    ctx.save();
    topLeftCutPath(ctx, photoX, photoY, photoW, photoH, 22);
    ctx.clip();
    ctx.fillStyle = "#0a0f22";
    ctx.fillRect(photoX, photoY, photoW, photoH);
    if(avatarImg){
      drawImageCover(ctx, avatarImg, photoX, photoY, photoW, photoH);
      const shade = ctx.createLinearGradient(0, photoY+photoH-170, 0, photoY+photoH);
      shade.addColorStop(0, "rgba(5,7,15,0)");
      shade.addColorStop(1, "rgba(5,7,15,0.9)");
      ctx.fillStyle = shade;
      ctx.fillRect(photoX, photoY, photoW, photoH);
    } else {
      ctx.fillStyle = "#232d4d";
      ctx.font = "130px Rajdhani, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("◈", photoX+photoW/2, photoY+photoH/2+45);
      ctx.textAlign = "left";
    }
    ctx.restore();
    ctx.save();
    ctx.strokeStyle = rankColor;
    ctx.lineWidth = 2;
    ctx.shadowColor = rankColor;
    ctx.shadowBlur = 12;
    topLeftCutPath(ctx, photoX, photoY, photoW, photoH, 22);
    ctx.stroke();
    ctx.restore();

    // Hunter name + title + ID overlaid on lower photo (license-photo caption style)
    const name = (state.hunterName && state.hunterName.trim()) || "Unnamed Hunter";
    const cardTitle = equippedTitleText();
    ctx.textAlign = "left";
    ctx.fillStyle = "#ffffff";
    ctx.font = "900 26px Orbitron, sans-serif";
    ctx.fillText(name, photoX+22, photoY+photoH-(cardTitle?74:50), photoW-44);
    if(cardTitle){
      ctx.fillStyle = "#f6c453";
      ctx.font = "600 15px Rajdhani, sans-serif";
      ctx.fillText("「 " + cardTitle + " 」", photoX+22, photoY+photoH-50, photoW-44);
    }
    ctx.fillStyle = "#c7d3ee";
    ctx.font = "600 14px 'JetBrains Mono', monospace";
    ctx.fillText(state.hunterId || "—", photoX+22, photoY+photoH-24);

    // ---- Divider between photo and info panel ----
    const dividerX = photoX + photoW + 17;
    ctx.strokeStyle = "rgba(94,169,255,0.28)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(dividerX, photoY+6); ctx.lineTo(dividerX, photoY+photoH-6); ctx.stroke();

    // ---- Info panel (right) ----
    const rx = photoX + photoW + 34;
    const rw = W - 22 - rx;

    ctx.fillStyle = "#5b6a94";
    ctx.font = "700 12px Orbitron, sans-serif";
    ctx.fillText("◆ SHADOW LOG ◆", rx, 32);

    // Rank hero block — the card's focal point, entirely off the photo
    const badgeSize = 100, badgeY = 56;
    ctx.save();
    ctx.shadowColor = rankColor; ctx.shadowBlur = 26;
    const badgeGrad = ctx.createLinearGradient(rx, badgeY, rx, badgeY+badgeSize);
    badgeGrad.addColorStop(0, rankColor);
    badgeGrad.addColorStop(1, shadeColor(rankColor, -30));
    ctx.fillStyle = badgeGrad;
    cutCornerPath(ctx, rx, badgeY, badgeSize, badgeSize, 14);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 1.5;
    cutCornerPath(ctx, rx, badgeY, badgeSize, badgeSize, 14);
    ctx.stroke();
    ctx.textAlign = "center";
    ctx.fillStyle = "#05070f";
    ctx.font = "900 52px Orbitron, sans-serif";
    ctx.fillText(rank, rx+badgeSize/2, badgeY+badgeSize/2+19);
    ctx.textAlign = "left";

    const heroTextX = rx + badgeSize + 26;
    ctx.fillStyle = "#ffffff";
    ctx.font = "700 32px 'JetBrains Mono', monospace";
    ctx.fillText("LEVEL " + state.level, heroTextX, badgeY+44);
    ctx.fillStyle = rankColor;
    ctx.font = "700 17px Rajdhani, sans-serif";
    ctx.fillText(rank + "-RANK HUNTER", heroTextX, badgeY+74);

    const dividerY = badgeY + badgeSize + 26;
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(rx, dividerY); ctx.lineTo(rx+rw, dividerY); ctx.stroke();

    // XP bar
    const need = xpToNext(state.level);
    const barX=rx, barY=dividerY+26, barW=rw, barH=16;
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    roundedRect(ctx,barX,barY,barW,barH,7); ctx.fill();
    const pct = Math.min(1, state.xp/need);
    const xpFillW = pct>0 ? Math.max(barW*pct, 7) : 0;
    const xpGrad = ctx.createLinearGradient(barX,0,barX+barW,0);
    xpGrad.addColorStop(0,"#2b6f96"); xpGrad.addColorStop(1,"#4fc3f7");
    ctx.fillStyle = xpGrad;
    ctx.shadowColor = "#4fc3f7"; ctx.shadowBlur = 8;
    roundedRect(ctx,barX,barY,xpFillW,barH,7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#a3aed0";
    ctx.font = "600 14px 'JetBrains Mono', monospace";
    ctx.fillText("XP " + state.xp + " / " + need, barX, barY+36);

    // STR / AGI / VIT — dynamically measured so labels never collide
    const stats = categoryPoints();
    const statColors = { STR:"#ffa195", AGI:"#7ce0a0", VIT:"#93bbff" };
    let statY = barY + 70;
    ["STR","AGI","VIT"].forEach(cat=>{
      const val = stats[cat] || 0;
      const info = tierInfo(val);
      const fillPct = tierFillPct(val)/100;

      ctx.font = "700 16px Orbitron, sans-serif";
      ctx.fillStyle = statColors[cat];
      ctx.fillText(cat, rx, statY);
      const catWidth = ctx.measureText(cat).width;

      ctx.font = "600 14px Rajdhani, sans-serif";
      ctx.fillStyle = "#b7c1e0";
      ctx.fillText("TIER " + info.label, rx + catWidth + 14, statY);

      ctx.textAlign = "right";
      ctx.fillStyle = "#e7ecfb";
      ctx.font = "600 14px 'JetBrains Mono', monospace";
      ctx.fillText(info.tier===3 ? val+" / MAX" : val+" / "+info.cap, rx+rw, statY);
      ctx.textAlign = "left";

      const sbY=statY+12, sbH=9;
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      roundedRect(ctx,rx,sbY,rw,sbH,4); ctx.fill();
      ctx.fillStyle = statColors[cat];
      ctx.shadowColor = statColors[cat]; ctx.shadowBlur = 6;
      const statFillW = fillPct>0 ? Math.max(rw*fillPct, 7) : 0;
      roundedRect(ctx,rx,sbY,statFillW,sbH,4); ctx.fill();
      ctx.shadowBlur = 0;
      statY += 56;
    });

    // Record stats panel — bordered module with a rank-colored top accent
    const panelY = statY + 6;
    const panelH = H - 40 - panelY - 18;
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    roundedRect(ctx, rx, panelY, rw, panelH, 8); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.16)";
    ctx.lineWidth = 1;
    roundedRect(ctx, rx, panelY, rw, panelH, 8); ctx.stroke();
    ctx.fillStyle = rankColor;
    roundedRect(ctx, rx, panelY, rw, 4, 2); ctx.fill();

    const longest = computeLongestStreak();
    const totalDays = (state.logs||[]).length;
    const colW = rw/3;
    function statBlock(label, value, color, colIdx, y){
      const bx = rx + colIdx*colW + colW/2;
      ctx.textAlign = "center";
      ctx.fillStyle = color;
      ctx.font = "900 38px Orbitron, sans-serif";
      ctx.shadowColor = color; ctx.shadowBlur = 10;
      ctx.fillText(String(value), bx, y);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#c3cce6";
      ctx.font = "600 13px Rajdhani, sans-serif";
      ctx.fillText(label.toUpperCase(), bx, y+24);
      ctx.textAlign = "left";
    }
    const streakY = panelY + panelH/2 + 8;
    statBlock("Hunt Streak", state.streak, "#f6c453", 0, streakY);
    statBlock("Longest Streak", longest, "#f6c453", 1, streakY);
    statBlock("Days Hunted", totalDays, "#4fc3f7", 2, streakY);
    // vertical separators inside the panel
    ctx.strokeStyle = "rgba(255,255,255,0.14)";
    [1,2].forEach(i=>{
      const lx = rx + colW*i;
      ctx.beginPath(); ctx.moveTo(lx, panelY+18); ctx.lineTo(lx, panelY+panelH-14); ctx.stroke();
    });

    // Footer + barcode
    ctx.fillStyle = "#a3aed0";
    ctx.font = "600 13px 'JetBrains Mono', monospace";
    const dateStr = new Date().toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
    ctx.fillText("Issued via Shadow Log · " + dateStr, rx, H-40);
    ctx.fillStyle = "rgba(255,255,255,0.92)";
    roundedRect(ctx, rx, H-34, rw, 20, 3); ctx.fill();
    drawBarcode(ctx, rx+8, H-30, rw-16, 12, state.hunterId || "SHADOWLOG", "#0a0f22");

    ctx.restore(); // closes clip-to-card-shape save
    ctx.restore(); // closes DPR scale save
  }

  // ---------- data backup (export / import) ----------
  function exportData(){
    try{
      const payload = {
        app: "shadow-log",
        version: 1,
        exportedAt: new Date().toISOString(),
        state: state,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "shadow-log-backup-" + todayStr() + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
      return true;
    }catch(err){
      console.error("Export failed", err);
      return false;
    }
  }

  function validateBackup(parsed){
    // Accept both wrapped payloads ({app, version, state}) and a raw state object.
    const s = (parsed && parsed.app === "shadow-log" && parsed.state) ? parsed.state : parsed;
    if(!s || typeof s !== "object") return null;
    if(typeof s.level !== "number" || typeof s.xp !== "number" || !Array.isArray(s.logs)) return null;
    return s;
  }

  function importDataFromFile(file, statusEl){
    const reader = new FileReader();
    reader.onload = (e)=>{
      let imported = null;
      try{ imported = validateBackup(JSON.parse(e.target.result)); }
      catch(err){ imported = null; }
      if(!imported){
        if(statusEl) statusEl.textContent = "That file doesn't look like a Shadow Log backup.";
        return;
      }
      const logCount = imported.logs.length;
      showConfirmOverlay(`Restore backup (Level ${imported.level}, ${logCount} logged day${logCount===1?"":"s"})? This will REPLACE all current progress.`, ()=>{
        state = Object.assign(defaultState(), imported);
        builder = [];
        selectedChartId = null;
        acceptedContractIds = new Set();
        // Reconcile derived state the same way a fresh page load does, so nothing
        // looks "lost" (achievements, boss status) until the next reload.
        checkStreakBreak();
        ensureWeeklyBoss();
        const bounty = processBossSlay();
        if(bounty > 0){ addXp(bounty); }
        checkAchievements();
        saveState();
        render();
      });
    };
    reader.onerror = ()=>{ if(statusEl) statusEl.textContent = "Couldn't read that file."; };
    reader.readAsText(file);
  }

  function showBackdateOverlay(){

      const label = i===1 ? `Yesterday (${fmtDate(d)})` : `${i} days ago (${fmtDate(d)})`;

    }

    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="sys-window card-window" style="max-width:520px;">

    const backdateWeightInput = overlay.querySelector("#backdateWeightInput");
    const pillsEl = overlay.querySelector("#backdatePills");
    const submitBtn = overlay.querySelector("#submitBackdateBtn");

    function placeholderFor(id){
      const ex = allExercises().find(e=>e.id===id);
      if(!ex) return "reps";
      const unit = ex.type === "time" ? "sec" : ex.type === "minutes" ? "min" : "reps";
      const goal = baseGoalFor(ex);
      return goal ? `${goal} ${unit} (goal)` : unit;
    }
    function syncBackdateWeight(){
      const hasWeight = !!(state.exerciseWeights && state.exerciseWeights[exerciseSelect.value]);
      if(hasWeight){ backdateWeightInput.classList.remove("hidden"); }
      else{ backdateWeightInput.classList.add("hidden"); backdateWeightInput.value = ""; }
    }
    exerciseSelect.addEventListener("change", ()=>{
      valueInput.placeholder = placeholderFor(exerciseSelect.value);
      syncBackdateWeight();
    });
    valueInput.placeholder = placeholderFor(exerciseSelect.value);
    syncBackdateWeight();

    function refreshPills(){
      if(entries.length === 0){
        pillsEl.innerHTML = `<div class="empty-note">No exercises added yet.</div>`;
      } else {
        pillsEl.innerHTML = entries.map((b,i)=>{
          const unitSuffix = b.type==="time" ? "s" : b.type==="minutes" ? "m" : "";
          const setsDisplay = b.sets.map((s,j)=>{
            const w = b.weights && b.weights[j];
            return w ? `${s}${unitSuffix}@${w}` : `${s}${unitSuffix}`;
          }).join(" · ");
          return `
          <div class="pill-row">
            <span class="name">${escapeHtml(b.name)}</span>
            <span class="cat">${b.category}</span>
            <span class="sets">${setsDisplay}</span>
            <button class="remove" data-backdate-remove="${i}" title="Remove">✕</button>
          </div>
        `;
        }).join("");
        pillsEl.querySelectorAll("[data-backdate-remove]").forEach(btn=>{
          btn.addEventListener("click", ()=>{
            entries.splice(parseInt(btn.dataset.backdateRemove,10),1);
            refreshPills();
          });
        });
      }
      submitBtn.disabled = entries.length === 0;
    }

    overlay.querySelector("#backdateAddSetBtn").addEventListener("click", ()=>{
      const id = exerciseSelect.value;
      const ex = allExercises().find(e=>e.id===id);
      const raw = parseInt(valueInput.value, 10);
      const val = (raw && raw > 0) ? raw : (ex ? baseGoalFor(ex) : 0);
      if(!ex || !val || val<=0){ valueInput.focus(); return; }
      let entry = entries.find(b=>b.id===id);
      if(!entry){ entry = {id:ex.id, name:ex.name, category:ex.category, type:ex.type, sets:[], weights:[]}; entries.push(entry); }
      if(!entry.weights) entry.weights = [];
      entry.sets.push(val);
      const w = backdateWeightInput && !backdateWeightInput.classList.contains("hidden") ? parseFloat(backdateWeightInput.value) : null;
      entry.weights.push(w && w > 0 ? w : null);
      valueInput.value = "";
      if(backdateWeightInput) backdateWeightInput.value = "";
      refreshPills();
      valueInput.focus();
    });
    valueInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); overlay.querySelector("#backdateAddSetBtn").click(); } });

    function close(){
      overlay.classList.remove("show");
      setTimeout(()=>overlay.remove(), 250);
    }
    overlay.querySelector("#closeBackdateOverlay").addEventListener("click", close);
    overlay.addEventListener("click", (e)=>{ if(e.target===overlay) close(); });

    submitBtn.addEventListener("click", ()=>{
      const targetDate = overlay.querySelector("#backdateDateSelect").value;
      const dateLabel = dateOptions.find(o=>o.date===targetDate).label;
      showConfirmOverlay(`Log ${entries.length} exercise${entries.length===1?"":"s"} for ${dateLabel}? This can't be easily undone (though you can remove it later from Quest History).`, ()=>{
        const result = completeBackdatedQuest(targetDate, entries);
        close();
        if(result){ showBackdateResultWindow(result); }
      });
    });
  }

    const templateSelect = document.getElementById("templateSelect");
    const quicklogBtn = document.getElementById("quicklogSelectedTemplate");
    const loadBtn = document.getElementById("loadSelectedTemplate");
    if(quicklogBtn && templateSelect){
      quicklogBtn.addEventListener("click", ()=>{ quickLogTemplate(templateSelect.value); });
    }
    if(loadBtn && templateSelect){
      loadBtn.addEventListener("click", ()=>{ loadTemplateIntoBuilder(templateSelect.value); });
    }

    document.querySelectorAll("[data-equip-title]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ toggleEquipTitle(btn.dataset.equipTitle); });
    });

    document.querySelectorAll("[data-remove-log]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ removeLogEntry(btn.dataset.removeLog); });
    });

    const rerollBtn = document.getElementById("rerollBoardBtn");
    if(rerollBtn){ rerollBtn.addEventListener("click", rerollBoard); }

    document.querySelectorAll("[data-gate-rank]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ setGateRank(btn.dataset.gateRank); });
    });

    document.querySelectorAll("[data-accept]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ acceptContract(btn.dataset.accept); });
    });

    const toggleRoster = document.getElementById("toggleRoster");
    if(toggleRoster){
      toggleRoster.addEventListener("click", ()=>{ rosterFormOpen = !rosterFormOpen; render(); });
    }
    const toggleBossLog = document.getElementById("toggleBossLog");
    if(toggleBossLog){
      toggleBossLog.addEventListener("click", ()=>{ bossLogOpen = !bossLogOpen; render(); });
    }
    document.querySelectorAll("[data-roster-day]").forEach(sel=>{
      sel.addEventListener("change", ()=>{
        const day = parseInt(sel.dataset.rosterDay, 10);
        state.roster[day] = sel.value;
        saveState();
        render();
      });
    });

    const exerciseSelect = document.getElementById("exerciseSelect");
    const setValueInput = document.getElementById("setValueInput");
    const setWeightInput = document.getElementById("setWeightInput");
    if(exerciseSelect){
      exerciseSelect.addEventListener("change", ()=>{
        setValueInput.placeholder = currentPlaceholder();
        updateWeightVisibility();
      });
    }

    const addSetBtn = document.getElementById("addSetBtn");
    if(addSetBtn){
      addSetBtn.addEventListener("click", ()=>{
        const id = exerciseSelect.value;
        const ex = allExercises().find(e=>e.id===id);
        const raw = parseInt(setValueInput.value, 10);
        const val = (raw && raw > 0) ? raw : (ex ? baseGoalFor(ex) : 0);
        if(!ex || !val || val<=0){ setValueInput.focus(); return; }
        let entry = builder.find(b=>b.id===id);
        if(!entry){ entry = {id:ex.id, name:ex.name, category:ex.category, type:ex.type, sets:[], weights:[]}; builder.push(entry); }
        if(!entry.weights) entry.weights = [];
        entry.sets.push(val);
        const weight = setWeightInput && !setWeightInput.classList.contains("hidden") ? parseFloat(setWeightInput.value) : null;
        entry.weights.push(weight && weight > 0 ? weight : null);
        setValueInput.value = "";
        if(setWeightInput) setWeightInput.value = "";
        render();
        document.getElementById("exerciseSelect").value = id;
        document.getElementById("setValueInput").focus();
      });
    }
    if(setValueInput){
      setValueInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); addSetBtn.click(); } });
    }
    if(setWeightInput){
      setWeightInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); addSetBtn.click(); } });
    }

    const openExerciseMgrBtn = document.getElementById("openExerciseMgrBtn");
    if(openExerciseMgrBtn){
      openExerciseMgrBtn.addEventListener("click", showExerciseManagerOverlay);
    }

    document.querySelectorAll(".pill-row .remove").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        builder.splice(parseInt(btn.dataset.idx,10),1);
        render();
      });
    });

    const completeBtn = document.getElementById("completeQuestBtn");
    if(completeBtn){ completeBtn.addEventListener("click", completeQuest); }

    const chartSelect = document.getElementById("chartSelect");
    if(chartSelect){
      chartSelect.addEventListener("change", ()=>{ selectedChartId = chartSelect.value; render(); });
    }

    const retrySaveBtn = document.getElementById("retrySaveBtn");
    if(retrySaveBtn){
      retrySaveBtn.addEventListener("click", retrySaveNow);
    }

    const resetBtn = document.getElementById("resetBtn");
    if(resetBtn){
      resetBtn.addEventListener("click", ()=>{
        showConfirmOverlay("Reset all Shadow Log data? This cannot be undone.", async ()=>{
          state = defaultState();
          builder = [];
          selectedChartId = null;
          acceptedContractIds = new Set();
          rosterFormOpen = false;
          await saveState();
          render();
        });
      });
    }
  }

  // Runs once when an older save first opens under the effort model. Every past quest gets
  // rescored the same way a new one would be, so a single number means the same thing across
  // your whole history rather than meaning "flat volume" before a certain date and "load moved"
  // after it. Returns the before/after levels when there was history to rescore.
  function migrateXpModel(){
    if(state.xpModelVersion === XP_MODEL_VERSION) return null;
    const hadHistory = (state.logs||[]).length > 0;
    const before = state.level;
    if(hadHistory){ recomputeAllLogXp(); }
    state.xpModelVersion = XP_MODEL_VERSION;
    saveState();
    return hadHistory ? { before, after: state.level } : null;
  }

  function showNoticeOverlay(tagText, title, bodyHtml){
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="sys-window">
        <div class="tag">◆ ${tagText} ◆</div>
        <h3>${title}</h3>
        <div style="text-align:left; font-size:13px; line-height:1.6;">${bodyHtml}</div>
        <div style="display:flex; justify-content:center; margin-top:20px;">
          <button class="btn primary" id="closeNoticeBtn">Understood</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=>overlay.classList.add("show"));
    function close(){
      overlay.classList.remove("show");
      setTimeout(()=>overlay.remove(), 250);
    }
    overlay.querySelector("#closeNoticeBtn").addEventListener("click", close);
    overlay.addEventListener("click", (e)=>{ if(e.target===overlay) close(); });
  }

  // ---------- init ----------
  async function init(){
    state = await loadState();
    const migration = migrateXpModel();
    checkStreakBreak();
    // Weekly boss reconcile: spawn/rollover, then silently process a kill that
    // imported or backdated data may have already earned (bounty still awarded).
    ensureWeeklyBoss();
    const loadBounty = processBossSlay();
    if(loadBounty > 0){ addXp(loadBounty); }
    // Retroactive unlocks for progress earned before this feature existed (silent — no popup on load)
    const retro = checkAchievements();
    if(retro.length > 0 || loadBounty > 0){ saveState(); }
    setupInfoBubbles();
    const settingsBtn = document.getElementById("settingsBtn");
    if(settingsBtn){ settingsBtn.addEventListener("click", showSettingsOverlay); }
    render();
    if(migration){
      const moved = migration.after === migration.before
        ? `Your Level held at <b>${migration.after}</b>.`
        : `Your Level moved from <b>${migration.before}</b> to <b>${migration.after}</b>.`;
      showNoticeOverlay("SYSTEM RECALIBRATION", "EFFORT REWEIGHTED",
        `<p style="margin:0 0 10px;">The System no longer counts reps — it weighs the load behind them. Every rep is now scored against your own bodyweight, and any weight you log is added on top, so ten reps at 100 lbs is worth exactly twice ten reps at 50 lbs. Cardio is scored by intensity per minute instead of flat time.</p>
         <p style="margin:0 0 10px;">Your entire hunt history has been rescored under the new measure. ${moved}</p>
         <p style="margin:0;">Set your bodyweight in <b>⚙ Settings</b> to calibrate it properly — the default assumes ${DEFAULT_BODYWEIGHT} lbs. Per-exercise load values live in <b>⚙ Manage Exercises</b>.</p>`);
    }
  }
  init();
})();
</script>
</body>
</html>
