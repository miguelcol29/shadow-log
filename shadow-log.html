<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shadow Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #05070f;
    --bg-glow: radial-gradient(ellipse 900px 500px at 50% -10%, rgba(79,195,247,0.10), transparent 60%);
    --panel: #0c1226;
    --panel-alt: #101838;
    --border: rgba(94,169,255,0.28);
    --border-strong: rgba(94,169,255,0.55);
    --blue: #4fc3f7;
    --blue-dim: #2b6f96;
    --purple: #8b6bff;
    --gold: #f6c453;
    --green: #34d399;
    --red: #f76b6b;
    --text: #e7ecfb;
    --text-dim: #8a94b8;
    --text-mid: #a9b4d0;
    --text-dim2: #5c6786;
    --radius-cut: 14px;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--bg-glow), var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    padding: 28px 18px 60px;
    position: relative;
    overflow-x: hidden;
  }
  body::before{
    content:"";
    position: fixed; inset:0;
    background-image:
      linear-gradient(rgba(79,195,247,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.035) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, black, transparent 75%);
  }

  /* ---------- Ambient particles ---------- */
  .particle-field{
    position: fixed; inset:0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle{
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 6px 1px rgba(79,195,247,0.8);
    animation-name: drift-up;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes drift-up{
    0%{ transform: translateY(0) translateX(0); opacity:0; }
    8%{ opacity:1; }
    92%{ opacity:1; }
    100%{ transform: translateY(-105vh) translateX(24px); opacity:0; }
  }

  /* ---------- Scanline sweep ---------- */
  .scanline{
    position: fixed; left:0; right:0;
    height: 140px;
    top: -140px;
    pointer-events: none;
    z-index: 1;
    background: linear-gradient(180deg, transparent, rgba(79,195,247,0.05), transparent);
    animation: scan-sweep 9s linear infinite;
  }
  @keyframes scan-sweep{
    0%{ top: -140px; }
    100%{ top: 100vh; }
  }

  .levelup-flash{
    position: fixed; inset:0; z-index: 55; pointer-events:none;
    background: radial-gradient(circle at 50% 38%, rgba(79,195,247,0.55), rgba(139,107,255,0.18) 42%, transparent 72%);
    animation: levelup-flash-anim 0.9s ease-out forwards;
  }
  @keyframes levelup-flash-anim{
    0%{ opacity:0; }
    15%{ opacity:1; }
    100%{ opacity:0; }
  }

  .wrap{ max-width: 980px; margin: 0 auto; position: relative; z-index:1; }

  ::selection{ background: rgba(79,195,247,0.35); }

  button, select, input{ font-family: inherit; touch-action: manipulation; }
  button{ cursor:pointer; }
  :focus-visible{ outline: 2px solid var(--blue); outline-offset: 2px; }

  /* ---------- Panel / signature "System Window" shell ---------- */
  .panel{
    background: linear-gradient(180deg, var(--panel), #0a0e20);
    border: 1px solid var(--border);
    clip-path: polygon(var(--radius-cut) 0, 100% 0, 100% calc(100% - var(--radius-cut)), calc(100% - var(--radius-cut)) 100%, 0 100%, 0 var(--radius-cut));
    padding: 22px 24px;
    position: relative;
  }
  .panel::before, .panel::after{
    content:"";
    position:absolute;
    width: 20px; height: 20px;
    pointer-events: none;
    animation: corner-pulse 4s ease-in-out infinite;
  }
  .panel::before{
    top:-1px; left:-1px;
    border-top: 2px solid var(--blue);
    border-left: 2px solid var(--blue);
    clip-path: polygon(0 0, 100% 0, 0 100%);
    opacity: 0.9;
  }
  .panel::after{
    bottom:-1px; right:-1px;
    border-bottom: 2px solid var(--blue);
    border-right: 2px solid var(--blue);
    clip-path: polygon(100% 100%, 0 100%, 100% 0);
    opacity: 0.9;
    animation-delay: 2s;
  }
  @keyframes corner-pulse{
    0%, 70%, 100%{ opacity: 0.9; filter: drop-shadow(0 0 0 transparent); }
    85%{ opacity: 1; filter: drop-shadow(0 0 4px var(--blue)); }
  }

  .eyebrow{
    font-family:'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--blue);
    text-transform: uppercase;
    display:flex; align-items:center; gap:8px;
    margin-bottom: 14px;
  }
  .eyebrow .dot{ width:7px; height:7px; background: var(--blue); box-shadow: 0 0 8px var(--blue); transform: rotate(45deg); }
  .panel-eyebrow-row{ justify-content:space-between; }
  .eyebrow-label{ display:flex; align-items:center; gap:8px; }
  .panel-gear-btn{
    background:none;
    border:1px solid var(--border);
    color: var(--text-dim2);
    width:24px; height:24px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    cursor:pointer;
    transition: all .2s ease;
    flex-shrink:0;
  }
  .panel-gear-btn:hover{ color: var(--blue); border-color: var(--border-strong); box-shadow: 0 0 8px rgba(79,195,247,0.3); transform: rotate(35deg); }

  /* ---------- Header ---------- */
  .title-block{ text-align:center; margin-bottom: 26px; }
  .title-block h1{
    font-family:'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 44px);
    letter-spacing: 6px;
    margin: 0;
    background: linear-gradient(180deg, #ffffff, var(--blue) 140%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 40px rgba(79,195,247,0.25);
  }
  .title-block p{
    margin: 8px 0 0;
    color: var(--text-dim2);
    font-size: 14px;
    letter-spacing: 1px;
  }
  .hunter-identity{
    margin-top: 14px;
    display:flex; align-items:center; justify-content:center;
    gap: 14px;
  }
  .hunter-avatar-frame{
    width: 60px; height: 60px;
    flex-shrink: 0;
    border: 2px solid var(--rank-color, var(--blue));
    box-shadow: 0 0 14px var(--rank-color-glow, rgba(79,195,247,0.4));
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    background: rgba(255,255,255,0.03);
    display:flex; align-items:center; justify-content:center;
    overflow: hidden;
  }
  .hunter-avatar-frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .avatar-placeholder{ color: var(--text-dim2); font-size:26px; }
  .hunter-name-display{
    font-family:'Orbitron', sans-serif;
    font-size: 15px;
    letter-spacing: 1.5px;
    color: var(--blue);
    text-shadow: 0 0 8px rgba(79,195,247,0.4);
  }

  .settings-btn{
    position: fixed;
    top: 16px; right: 16px;
    z-index: 40;
    width: 36px; height: 36px;
    display:flex; align-items:center; justify-content:center;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(12,18,38,0.7);
    color: var(--text-dim2);
    font-size: 17px;
    cursor: pointer;
    transition: all .2s ease;
    backdrop-filter: blur(4px);
  }
  .settings-btn:hover{ color: var(--blue); border-color: var(--border-strong); box-shadow: 0 0 12px rgba(79,195,247,0.3); transform: rotate(35deg); }

  /* ---------- Player status panel ---------- */
  .status-grid{
    display:grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px 28px;
    align-items:center;
  }
  .rank-badge{
    font-family:'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 34px;
    width: 64px; height: 64px;
    display:flex; align-items:center; justify-content:center;
    border: 2px solid var(--rank-color, var(--blue));
    color: var(--rank-color, var(--blue));
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    text-shadow: 0 0 14px var(--rank-color, var(--blue));
    box-shadow: inset 0 0 18px rgba(79,195,247,0.08);
    flex-shrink:0;
    animation: badge-breathe 3.2s ease-in-out infinite;
  }
  @keyframes badge-breathe{
    0%, 100%{ box-shadow: inset 0 0 18px rgba(79,195,247,0.08), 0 0 6px var(--rank-color, var(--blue)); }
    50%{ box-shadow: inset 0 0 18px rgba(79,195,247,0.08), 0 0 20px var(--rank-color, var(--blue)); }
  }
  .level-info{ min-width: 0; }
  .level-row{
    display:flex; align-items:baseline; gap:12px; margin-bottom:8px; flex-wrap:wrap;
  }
  .level-row .lv{
    font-family:'JetBrains Mono', monospace;
    font-size: 22px; font-weight:700; color:#fff;
  }
  .level-row .lv span{ color: var(--blue); }
  .level-row .rank-label{ font-size:13px; color:var(--text-dim2); letter-spacing:1px; }
  .xp-bar-track{
    height: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    position:relative;
    overflow:hidden;
  }
  .xp-bar-fill{
    height:100%;
    background: linear-gradient(90deg, var(--blue-dim), var(--blue));
    box-shadow: 0 0 12px rgba(79,195,247,0.6);
    transition: width 0.6s cubic-bezier(.2,.8,.2,1);
    width:0%;
    position: relative;
    overflow: hidden;
  }
  .xp-bar-fill::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.55) 48%, transparent 66%);
    background-size: 60% 100%;
    animation: shimmer-sweep 2.6s linear infinite;
  }
  @keyframes shimmer-sweep{
    0%{ background-position: -80% 0; }
    100%{ background-position: 180% 0; }
  }
  .xp-text{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim2);
    margin-top:6px; letter-spacing: 0.5px;
  }
  .streak-block{ text-align:center; flex-shrink:0; }
  .streak-num{
    font-family:'Orbitron', sans-serif;
    font-size: 30px; font-weight:700; color: var(--gold);
    line-height:1;
    text-shadow: 0 0 14px rgba(246,196,83,0.4);
  }
  .streak-label{ font-size:11px; color: var(--text-dim2); letter-spacing:2px; margin-top:4px; }
  .streak-bonus{ font-family:'JetBrains Mono', monospace; font-size:11px; color: var(--green); margin-top:4px; }
  .grace-status{ font-size:10px; color: var(--text-dim2); margin-top:4px; letter-spacing:0.5px; }

  /* ---------- Stats row ---------- */
  .substats{
    display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-top:22px;
  }
  .substat{ }
  .substat-head{ display:flex; justify-content:space-between; font-size:12px; letter-spacing:1.5px; margin-bottom:6px; }
  .substat-head b{ font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:500; color: var(--text-mid); }
  .substat-head em{ font-style:normal; font-size:10px; color: var(--text-dim2); letter-spacing:1px; margin-left:6px; }

  /* ---------- Info bubbles ---------- */
  .info-btn{
    display:inline-flex; align-items:center; justify-content:center;
    width:15px; height:15px;
    border-radius:50%;
    border: 1px solid var(--text-dim2);
    color: var(--text-dim2);
    background: transparent;
    font-family:'JetBrains Mono', monospace;
    font-size:10px; font-weight:700;
    line-height:1;
    padding:0;
    margin-left:6px;
    vertical-align:middle;
    cursor:pointer;
    flex-shrink:0;
  }
  .info-btn:hover, .info-btn.active{ border-color: var(--blue); color: var(--blue); box-shadow: 0 0 6px rgba(79,195,247,0.4); }
  .info-popover{
    position: fixed;
    z-index: 60;
    max-width: 260px;
    background: linear-gradient(180deg, #0d1530, #070a18);
    border: 1px solid var(--blue);
    box-shadow: 0 0 24px rgba(79,195,247,0.2);
    padding: 12px 14px;
    font-size: 12px;
    line-height:1.5;
    color: var(--text-mid);
    display: none;
    clip-path: polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .info-popover.show{ display:block; }
  .info-popover .info-title{
    font-family:'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .substat-bar{ height:6px; background:rgba(255,255,255,0.05); border:1px solid var(--border); overflow:hidden; }
  .substat-fill{ height:100%; transition: width .5s ease; }
  .substat-fill.maxed{ box-shadow: 0 0 8px currentColor; }
  .substat .str{ color:#ff8a7a; } .substat-fill.str{ background: linear-gradient(90deg,#a13f34,#ff8a7a); }
  .substat .agi{ color:#7ce0a0; } .substat-fill.agi{ background: linear-gradient(90deg,#1f6b45,#7ce0a0); }
  .substat .vit{ color:#8fb8ff; } .substat-fill.vit{ background: linear-gradient(90deg,#2c4f96,#8fb8ff); }

  /* ---------- Grid layout ---------- */
  .grid-2{ display:grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
  @media (max-width: 760px){ .grid-2{ grid-template-columns: 1fr; } }
  .stack{ display:flex; flex-direction:column; gap:18px; margin-top:18px; }

  h2.panel-title{
    font-family:'Orbitron', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    margin: 0 0 16px;
    color: #fff;
  }
  h2.panel-title small{ display:block; font-family:'Rajdhani',sans-serif; font-weight:500; font-size:12px; color:var(--text-dim2); letter-spacing:0.5px; margin-top:3px; }

  /* ---------- Quest builder ---------- */
  .builder-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  select, .num-input{
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 500;
  }
  select{
    flex:1; min-width: 160px;
    appearance: none; -webkit-appearance: none; -moz-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--blue) 50%), linear-gradient(135deg, var(--blue) 50%, transparent 50%);
    background-position: calc(100% - 18px) center, calc(100% - 12px) center;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
    padding-right: 32px;
  }
  select option, select optgroup{
    background: #0d1428;
    color: var(--text);
  }
  select option:checked, select option:hover{
    background: #16264d;
  }
  select optgroup{
    color: var(--blue);
    font-weight: 700;
    font-style: normal;
  }
  .num-input{ width: 90px; }
  .btn{
    background: rgba(79,195,247,0.08);
    border: 1px solid var(--border-strong);
    color: var(--blue);
    padding: 10px 18px;
    font-weight:700;
    letter-spacing: 1px;
    font-size: 13px;
    text-transform: uppercase;
    transition: all .15s ease;
    clip-path: polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  }
  .btn:hover{ background: rgba(79,195,247,0.18); box-shadow: 0 0 16px rgba(79,195,247,0.25); }
  .btn.primary{ background: linear-gradient(90deg, rgba(79,195,247,0.25), rgba(139,107,255,0.25)); color:#fff; }
  .btn.primary:hover{ box-shadow: 0 0 20px rgba(139,107,255,0.35); }
  .btn.ghost{ background:transparent; color: var(--text-dim2); border-color: var(--border); font-weight:600; }
  .btn.small{ padding:6px 12px; font-size:11px; }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; box-shadow:none; }

  .builder-pills{ display:flex; flex-direction:column; gap:8px; margin-bottom: 16px; }
  .empty-note{ color: var(--text-dim2); font-size: 13px; font-style: italic; padding: 6px 0; }
  .pill-row{
    display:flex; align-items:center; gap:10px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 13px;
  }
  .pill-row .name{ font-weight:700; flex:1; }
  .pill-row .cat{ font-size:10px; letter-spacing:1px; color: var(--text-dim2); border:1px solid var(--border); padding:2px 6px; }
  .pill-row .sets{ font-family:'JetBrains Mono', monospace; color: var(--blue); font-size:12px; }
  .pill-row .remove{ background:none; border:none; color: var(--red); font-size:16px; line-height:1; padding:0 4px; }

  .toggle-custom{ font-size:12px; color: var(--text-dim2); text-decoration: underline; background:none; border:none; padding:0; margin-bottom:12px; letter-spacing:0.5px; }
  .custom-form{ display:none; gap:10px; flex-wrap:wrap; margin-bottom:14px; padding:12px; background: rgba(255,255,255,0.02); border:1px dashed var(--border); }
  .custom-form.open{ display:flex; }
  .custom-form input[type=text]{ flex:1; min-width:140px; }

  .exercise-manager{ display:none; flex-direction:column; gap:14px; margin-bottom:14px; padding:12px; background: rgba(255,255,255,0.02); border:1px dashed var(--border); }
  .exercise-manager.open{ display:flex; }
  .ex-mgr-cat{ font-size:11px; letter-spacing:1.5px; color: var(--text-dim2); margin-bottom:6px; }
  .ex-mgr-row{ display:flex; align-items:center; justify-content:space-between; padding:5px 0; font-size:13px; }
  .ex-mgr-row.is-hidden span{ color: var(--text-dim2); text-decoration: line-through; }
  .ex-mgr-row .btn{ margin-top:0; }
  .ex-mgr-note{ font-size:11px; color: var(--text-dim2); line-height:1.4; }

  /* ---------- Job board ---------- */
  .board-head{ display:flex; justify-content:space-between; align-items:flex-end; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .board-type{ font-family:'Orbitron', sans-serif; font-size:16px; letter-spacing:1.5px; text-shadow: 0 0 10px currentColor; }
  .board-sub{ font-size:11px; color: var(--text-dim2); letter-spacing:1px; margin-top:3px; }
  .gate-select-row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; padding-bottom:14px; border-bottom:1px dashed var(--border); }
  .gate-select-label{ font-size:10px; letter-spacing:2px; color: var(--text-dim2); flex-shrink:0; }
  .gate-pills{ display:flex; gap:6px; }
  .gate-pill{
    width:28px; height:28px;
    border-radius:50%;
    border: 1px solid var(--gate-color, var(--border));
    background: transparent;
    color: var(--gate-color, var(--text-dim2));
    font-family:'Orbitron', sans-serif;
    font-size:12px; font-weight:700;
    cursor:pointer;
    transition: all .15s ease;
  }
  .gate-pill:hover{ box-shadow: 0 0 8px var(--gate-color, var(--blue)); }
  .gate-pill.active{ background: var(--gate-color, var(--blue)); color:#05070f; box-shadow: 0 0 12px var(--gate-color, var(--blue)); }
  .board-grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px; }
  .contract-card{
    background: rgba(255,255,255,0.02);
    border: 1px dashed var(--cat-color, var(--border));
    padding: 14px;
    position: relative;
    display:flex; flex-direction:column; gap:4px;
  }
  .contract-card.accepted{ opacity: 0.7; border-style: solid; animation: accepted-glow 3s ease-in-out infinite; }
  @keyframes accepted-glow{
    0%, 100%{ box-shadow: 0 0 0 rgba(52,211,153,0); }
    50%{ box-shadow: 0 0 14px rgba(52,211,153,0.35); }
  }
  .contract-cat{ font-size:10px; letter-spacing:2px; font-weight:700; }
  .contract-name{ font-family:'Orbitron', sans-serif; font-size:14px; color:#fff; margin-bottom:2px; }
  .contract-target{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--text-mid); }
  .contract-flavor{ font-size:11px; color: var(--text-dim2); font-style:italic; margin-bottom:8px; }
  .contract-card .btn{ align-self:flex-start; }
  .contract-accepted{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--green); letter-spacing:1px; }
  .roster-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 0; font-size:13px; }
  .roster-row select{ min-width: 150px; flex:none; }

  .today-summary{ margin-top: 6px; font-size: 12px; color: var(--text-dim2); font-family:'JetBrains Mono', monospace; }

  /* ---------- Heatmap ---------- */
  .heatmap-wrap{ overflow-x:auto; padding-bottom: 4px; }
  .heatmap{ display:grid; grid-auto-flow:column; grid-template-rows: repeat(7, 12px); gap:3px; width:max-content; }
  .hm-cell{ width:12px; height:12px; background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.03); }
  .hm-cell.logged{ background: var(--blue); box-shadow: 0 0 6px rgba(79,195,247,0.6); }
  .hm-cell.today{ outline: 1px solid var(--gold); }
  .heatmap-legend{ display:flex; align-items:center; gap:6px; margin-top:10px; font-size:10px; color:var(--text-dim2); flex-wrap:wrap; }
  .heatmap-legend .hm-cell{ width:10px; height:10px; }

  /* ---------- Progress chart ---------- */

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "shadowlog-state";

  // Claude's artifact storage only exists inside Claude. When this file is opened
  // standalone (e.g. hosted on GitHub Pages, or double-clicked locally), fall back
  // to localStorage so progress still saves — just scoped to this browser/device.
  const HAS_CLAUDE_STORAGE = (typeof window !== "undefined") && !!window.storage && typeof window.storage.get === "function";
  const IS_STANDALONE = !HAS_CLAUDE_STORAGE;

  async function storageGet(key){
    if(HAS_CLAUDE_STORAGE) return window.storage.get(key, false);
    const raw = localStorage.getItem(key);
    if(raw === null) throw new Error("No local data for " + key);
    return { key, value: raw, shared:false };
  }
  async function storageSet(key, value){
    if(HAS_CLAUDE_STORAGE) return window.storage.set(key, value, false);
    localStorage.setItem(key, value);
    return { key, value, shared:false };
  }

  const DEFAULT_EXERCISES = [
    {id:"pushups", name:"Push-Ups", category:"STR", type:"reps"},
    {id:"pullups", name:"Pull-Ups", category:"STR", type:"reps"},
    {id:"dips", name:"Dips", category:"STR", type:"reps"},
    {id:"rows", name:"Bodyweight Rows", category:"STR", type:"reps"},
    {id:"squats", name:"Squats", category:"AGI", type:"reps"},
    {id:"lunges", name:"Lunges", category:"AGI", type:"reps"},
    {id:"burpees", name:"Burpees", category:"AGI", type:"reps"},
    {id:"mtnclimbers", name:"Mountain Climbers", category:"AGI", type:"reps"},
    {id:"plank", name:"Plank", category:"VIT", type:"time"},
    {id:"handstand", name:"Handstand Hold", category:"VIT", type:"time"},
    {id:"legraises", name:"Leg Raises", category:"VIT", type:"reps"},
    {id:"situps", name:"Sit-Ups", category:"VIT", type:"reps"},
    {id:"jogging", name:"Jogging", category:"AGI", type:"minutes"},
  ];

  const CATEGORY_LABEL = { STR:"Strength — Push, Pull, Press", AGI:"Agility — Speed & Power", VIT:"Vitality — Endurance & Core" };
  const RANK_COLORS = { E:"#aab6dd", D:"#4fc3f7", C:"#34d399", B:"#8b6bff", A:"#ff8a5c", S:"#f6c453" };

  const CONTRACT_LABELS = { STR:"Strength Contract", AGI:"Agility Contract", VIT:"Vitality Contract", FULL:"Full Hunt", REST:"Guild Holiday" };
  const CONTRACT_COLORS = { STR:"#ff8a7a", AGI:"#7ce0a0", VIT:"#8fb8ff", FULL:"#f6c453", REST:"#7a86a8" };
  const RANK_ORDER = ["E","D","C","B","A","S"];
  const SYNC_STATUS_TEXT = { idle:"", saving:"◆ Saving…", retrying:"⚠ Connection hiccup — retrying save…", stalled:"⚠ Not saving right now — your progress is safe on screen, but reload will lose it." };
  const GATE_TARGETS = {
    reps:    { E:12, D:25, C:40, B:55, A:80,  S:110 },
    time:    { E:20, D:35, C:50, B:70, A:95,  S:130 },
    minutes: { E:10, D:15, C:20, B:28, A:38,  S:50  },
  };
  function gateTarget(type, gateRank){
    const table = GATE_TARGETS[type] || GATE_TARGETS.reps;
    return table[gateRank] || table.E;
  }
  const DEFAULT_ROSTER = { 0:"REST", 1:"STR", 2:"AGI", 3:"VIT", 4:"FULL", 5:"STR", 6:"AGI" };
  const WEEKDAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  const INFO_CONTENT = {
    level: { title:"LEVEL", text:"Every rep, second held, or minute logged earns XP. Fill the XP bar to level up. XP needed for the next level = round(55 × level^1.55), so each level takes progressively more than the last." },
    rank: { title:"RANK", text:"Rank is just a badge tied to your level, not a separate track: E (1–9), D (10–19), C (20–29), B (30–39), A (40–49), S (50+). Leveling up is what moves your rank." },
    xp: { title:"XP", text:"Base XP per set: 1 XP/rep, 0.4 XP/second held (planks, holds), 3 XP/minute of cardio. Your current Hunt Streak bonus (up to +25%) is added on top of every quest's XP. Total fills the bar toward your next level; leftover carries into the new bar after a level-up." },
    str: { title:"STR", text:"Counts distinct Strength exercises you've logged — 1 point per exercise per day (2 different STR moves in one day = 2 points). Tier I: 0–100. Tier II: 100–1000, progress carries over. Tier MAX once you pass 1000, no further cap." },
    agi: { title:"AGI", text:"Counts distinct Agility exercises you've logged — 1 point per exercise per day (2 different AGI moves in one day = 2 points). Tier I: 0–100. Tier II: 100–1000, progress carries over. Tier MAX once you pass 1000, no further cap." },
    vit: { title:"VIT", text:"Counts distinct Vitality exercises you've logged — 1 point per exercise per day (2 different VIT moves in one day = 2 points). Tier I: 0–100. Tier II: 100–1000, progress carries over. Tier MAX once you pass 1000, no further cap." },
    streak: { title:"HUNT STREAK", text:"Counts consecutive days you've logged a quest. Logging today after logging yesterday adds 1. You also get 1 Rest Day of grace per rolling 7-day period — miss a single day and your streak still carries through, no XP or progress lost. Miss 2+ days in a row, or use your Rest Day again before it recharges, and the streak resets to 1. Every streak day adds +1% bonus XP to that day's quests, capped at +25%." },
    gate: { title:"GATE RANK", text:"Sets the difficulty of suggested Job Board contracts, like gate ranks in the show — an E-Gate suggests 12 reps, an S-Gate suggests 110. Defaults to match your current Hunter Rank, but you can raise or lower it any time to make contracts easier or harder. It only affects suggested targets — accepted sets, and any Freelance Quest you log manually, can always be edited." },
  };
  function infoBtn(key){
    return `<button class="info-btn" type="button" data-info-key="${key}" aria-label="How ${key.toUpperCase()} works">i</button>`;
  }

  let state = null;
  let builder = []; // [{id,name,category,type,sets:[]}]
  let selectedChartId = null;
  let rosterFormOpen = false;
  let acceptedContractIds = new Set();

  // ---------- date helpers ----------
  function todayStr(){
    const d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function addDays(dateStr, n){
    const d = new Date(dateStr+"T00:00:00");
    d.setDate(d.getDate()+n);
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function daysBetween(a,b){
    const da = new Date(a+"T00:00:00"), db = new Date(b+"T00:00:00");
    return Math.round((db-da)/86400000);
  }
  function fmtDate(dateStr){
    const d = new Date(dateStr+"T00:00:00");
    return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
  }
  const GRACE_WINDOW_DAYS = 7;
  // Determines whether a streak survives the gap between lastLogDate and today.
  // Allows exactly one missed day, usable at most once per rolling 7-day window.
  function checkStreakGrace(lastLogDate, today){
    if(!lastLogDate) return {continued:false, usedGrace:false, missedDate:null};
    if(lastLogDate === today) return {continued:true, usedGrace:false, missedDate:null};
    const gap = daysBetween(lastLogDate, today);
    if(gap === 1) return {continued:true, usedGrace:false, missedDate:null};
    if(gap === 2){
      const missedDate = addDays(lastLogDate, 1);
      const lastGraceUse = state.grace && state.grace.lastUsedDate;
      const graceAvailable = !lastGraceUse || daysBetween(lastGraceUse, missedDate) >= GRACE_WINDOW_DAYS;
      if(graceAvailable) return {continued:true, usedGrace:true, missedDate};
    }
    return {continued:false, usedGrace:false, missedDate:null};
  }
  function isGraceAvailable(today){
    const lastGraceUse = state.grace && state.grace.lastUsedDate;
    return !lastGraceUse || daysBetween(lastGraceUse, today) >= GRACE_WINDOW_DAYS;
  }

  // ---------- state helpers ----------
  function defaultState(){
    return { level:1, xp:0, streak:0, lastLogDate:null, logs:[], customExercises:[], roster: Object.assign({}, DEFAULT_ROSTER), board: null, grace: { lastUsedDate: null }, gateRank: null, hunterName:"", hunterId:null, hunterAvatar:null, hiddenExerciseIds:[] };
  }
  function allExercises(){
    return DEFAULT_EXERCISES.concat(state.customExercises || []);
  }
  // Exercises available for picking (dropdown, job board). Hidden ones are excluded here
  // but allExercises() still resolves them by id for history/chart lookups of past logs.
  function visibleExercises(){
    const hidden = state.hiddenExerciseIds || [];
    return allExercises().filter(e=>hidden.indexOf(e.id)===-1);
  }
  function xpToNext(level){ return Math.round(55 * Math.pow(level, 1.55)); }
  function rankFor(level){
    if(level<10) return "E";
    if(level<20) return "D";
    if(level<30) return "C";
    if(level<40) return "B";
    if(level<50) return "A";
    return "S";
  }
  function categoryPoints(){
    const totals = {STR:0, AGI:0, VIT:0};
    (state.logs||[]).forEach(log=>{
      (log.entries||[]).forEach(e=>{ totals[e.category] = (totals[e.category]||0) + 1; });
    });
    return totals;
  }
  function tierInfo(points){
    if(points < 100) return {tier:1, label:"I", cap:100, floor:0};
    if(points < 1000) return {tier:2, label:"II", cap:1000, floor:100};
    return {tier:3, label:"MAX", cap:1000, floor:100};
  }
  function tierFillPct(points){
    const info = tierInfo(points);
    if(info.tier === 3) return 100;
    return Math.min(100, (points/info.cap)*100);
  }

  // ---------- job board ----------
  function todayWeekday(){ return new Date().getDay(); }

  function lastLoggedMap(){
    const map = {};
    const sorted = (state.logs||[]).slice().sort((a,b)=> a.date<b.date?-1:1);
    sorted.forEach(log=>{
      log.entries.forEach(e=>{ map[e.id] = log.date; });
    });
    return map;
  }
  function daysSinceLogged(dateStr){ return dateStr ? daysBetween(dateStr, todayStr()) : Infinity; }

  function contractPool(category){ return visibleExercises().filter(e=>e.category===category); }

  function pickForCategory(category, count, excludeIds, lastMap){
    let pool = contractPool(category).filter(e=>excludeIds.indexOf(e.id)===-1);
    if(pool.length < count) pool = contractPool(category);
    pool = pool.slice().sort((a,b)=>{
      const da = daysSinceLogged(lastMap[a.id]), db = daysSinceLogged(lastMap[b.id]);
      if(da===db) return 0;
      return db-da;
    });
    return pool.slice(0, count);
  }

  function generateBoard(excludeIds){
    const type = state.roster[todayWeekday()];
    const lastMap = lastLoggedMap();
    let ids = [];
    if(type === "REST"){
      ids = [];
    } else if(type === "FULL"){
      ["STR","AGI","VIT"].forEach(cat=>{
        const picks = pickForCategory(cat, 1, excludeIds||[], lastMap);
        if(picks[0]) ids.push(picks[0].id);
      });
    } else {
      ids = pickForCategory(type, 3, excludeIds||[], lastMap).map(p=>p.id);
    }
    return { date: todayStr(), contractType: type, exerciseIds: ids };
  }

  function ensureBoard(){
    if(!state.gateRank){
      state.gateRank = rankFor(state.level);
      saveState();
    }
    if(!state.hunterId){
      state.hunterId = genHunterId();
      saveState();
    }
    const today = todayStr();
    const type = state.roster[todayWeekday()];
    if(!state.board || state.board.date !== today || state.board.contractType !== type){
      state.board = generateBoard([]);
      acceptedContractIds = new Set();
      saveState();
    }
  }

  function genHunterId(){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let s = "";
    for(let i=0;i<5;i++){ s += chars[Math.floor(Math.random()*chars.length)]; }
    return "SL-" + s;
  }

  // Replays log history through the same continuation + grace rules to find the longest streak ever reached.
  function computeLongestStreak(){
    const dates = Array.from(new Set((state.logs||[]).map(l=>l.date))).sort();
    if(dates.length===0) return 0;
    let streak = 1, longest = 1, graceLastUsed = null;
    for(let i=1;i<dates.length;i++){
      const prev = dates[i-1], curr = dates[i];
      const gap = daysBetween(prev, curr);
      if(gap === 1){
        streak += 1;
      } else if(gap === 2){
        const missed = addDays(prev, 1);
        const graceAvailable = !graceLastUsed || daysBetween(graceLastUsed, missed) >= GRACE_WINDOW_DAYS;
        if(graceAvailable){ streak += 1; graceLastUsed = missed; }
        else{ streak = 1; }
      } else {
        streak = 1;
      }
      if(streak > longest) longest = streak;
    }
    return longest;
  }

  function rerollBoard(){
    const exclude = state.board ? state.board.exerciseIds : [];
    state.board = generateBoard(exclude);
    acceptedContractIds = new Set();
    saveState();
    render();
  }

  function setGateRank(rank){
    if(RANK_ORDER.indexOf(rank) === -1) return;
    state.gateRank = rank;
    saveState();
    render();
  }

  function acceptContract(id){
    const ex = allExercises().find(e=>e.id===id);
    if(!ex) return;
    const target = gateTarget(ex.type, state.gateRank);
    let entry = builder.find(b=>b.id===id);
    if(!entry){ entry = {id:ex.id, name:ex.name, category:ex.category, type:ex.type, sets:[]}; builder.push(entry); }
    entry.sets.push(target);
    acceptedContractIds.add(id);
    render();
  }

  let saveInFlight = false;
  let savePending = false;
  let lastSaveTime = 0;
  let consecutiveFailures = 0;
  const MIN_SAVE_INTERVAL = 600;
  const MAX_FAST_RETRIES = 4;
  let syncStatus = "idle"; // idle | saving | retrying | stalled

  function setSyncStatus(status){
    syncStatus = status;
    const textEl = document.getElementById("syncStatusText");
    const retryBtn = document.getElementById("retrySaveBtn");
    if(textEl){ textEl.textContent = SYNC_STATUS_TEXT[status] || ""; }
    const wrap = document.getElementById("syncStatus");
    if(wrap){ wrap.className = "sync-status " + status; }
    if(retryBtn){ retryBtn.style.display = status === "stalled" ? "inline-block" : "none"; }
  }

  function saveState(){
    savePending = true;
    return processSaveQueue();
  }

  function retrySaveNow(){
    consecutiveFailures = 0;
    savePending = true;
    processSaveQueue();
  }

  async function processSaveQueue(){
    if(saveInFlight) return;
    saveInFlight = true;
    while(savePending){
      savePending = false;
      setSyncStatus("saving");
      const wait = Math.max(0, MIN_SAVE_INTERVAL - (Date.now() - lastSaveTime));
      if(wait > 0) await new Promise(r=>setTimeout(r, wait));
      try{
        const result = await storageSet(STORAGE_KEY, JSON.stringify(state));
        if(!result){ throw new Error("Storage set returned no result"); }
        consecutiveFailures = 0;
        setSyncStatus("idle");
      }catch(err){
        consecutiveFailures++;
        console.error(`Save failed (attempt ${consecutiveFailures})`, err);
        savePending = true;
        if(consecutiveFailures > MAX_FAST_RETRIES){
          setSyncStatus("stalled");
          await new Promise(r=>setTimeout(r, 30000));
        } else {
          setSyncStatus("retrying");
          const backoff = Math.min(15000, 1500 * Math.pow(1.7, consecutiveFailures-1));
          await new Promise(r=>setTimeout(r, backoff));
        }
      }
      lastSaveTime = Date.now();
    }
    saveInFlight = false;
  }
  async function loadState(){
    try{
      const res = await storageGet(STORAGE_KEY);
      if(res && res.value){ return Object.assign(defaultState(), JSON.parse(res.value)); }
    }catch(err){ /* no existing data */ }
    return defaultState();
  }

  function checkStreakBreak(){
    if(state.lastLogDate){
      const today = todayStr();
      if(state.lastLogDate !== today){
        const check = checkStreakGrace(state.lastLogDate, today);
        if(!check.continued && state.streak !== 0){
          state.streak = 0;
          saveState();
        }
      }
    }
  }

  function addXp(amount){
    state.xp += amount;
    let leveledUp = false;
    const oldRank = rankFor(state.level);
    while(state.xp >= xpToNext(state.level)){
      state.xp -= xpToNext(state.level);
      state.level += 1;
      leveledUp = true;
    }
    const newRank = rankFor(state.level);
    const rankedUp = newRank !== oldRank ? newRank : null;
    return {leveledUp, rankedUp};
  }

  function completeQuest(){
    if(builder.length === 0) return;
    const today = todayStr();
    const oldPoints = categoryPoints();
    const oldTiers = {STR:tierInfo(oldPoints.STR).tier, AGI:tierInfo(oldPoints.AGI).tier, VIT:tierInfo(oldPoints.VIT).tier};
    let baseXp = 0;
    const entries = builder.map(b=>{
      const sum = b.sets.reduce((a,c)=>a+c,0);
      const xp = b.type === "time" ? Math.round(sum*0.4) : b.type === "minutes" ? Math.round(sum*3) : Math.round(sum);
      baseXp += xp;
      return {id:b.id, name:b.name, category:b.category, type:b.type, sets:b.sets.slice(), xp};
    });

    let log = state.logs.find(l=>l.date===today);
    if(!log){ log = {date:today, entries:[], totalXp:0}; state.logs.push(log); }
    entries.forEach(e=>{
      const existing = log.entries.find(x=>x.id===e.id);
      if(existing){ existing.sets = existing.sets.concat(e.sets); existing.xp += e.xp; }
      else{ log.entries.push(e); }
    });

    let usedGraceToday = false;
    if(state.lastLogDate !== today){
      const check = checkStreakGrace(state.lastLogDate, today);
      state.streak = check.continued ? state.streak + 1 : 1;
      if(check.usedGrace){
        state.grace.lastUsedDate = check.missedDate;
        usedGraceToday = true;
      }
      state.lastLogDate = today;
    }

    const bonusPct = Math.min(25, state.streak * 1);
    const bonusXp = Math.round(baseXp * bonusPct / 100);
    const totalXp = baseXp + bonusXp;
    log.totalXp += totalXp;

    const result = addXp(totalXp);
    const newPoints = categoryPoints();
    const tierUps = ["STR","AGI","VIT"].filter(cat=> tierInfo(newPoints[cat]).tier > oldTiers[cat])
      .map(cat=> ({cat, label: tierInfo(newPoints[cat]).label}));
    builder = [];
    saveState();
    render();
    if(result.leveledUp){ triggerLevelUpFlash(); }
    showSystemWindow(baseXp, result.leveledUp, result.rankedUp, tierUps, bonusPct, bonusXp, usedGraceToday);
  }

  function renderProgressChart(){
    if(!selectedChartId) return `<div class="no-data">Log a quest to start tracking progress.</div>`;
    const ex = allExercises().find(e=>e.id===selectedChartId);
    if(!ex) return `<div class="no-data">Log a quest to start tracking progress.</div>`;

    const unitLabel = ex.type==="time" ? "Seconds" : ex.type==="minutes" ? "Minutes" : "Reps";

    const points = [];
    (state.logs||[]).slice().sort((a,b)=>a.date<b.date?-1:1).forEach(l=>{
      const entry = l.entries.find(e=>e.id===selectedChartId);
      if(entry){ points.push({date:l.date, value: entry.sets.reduce((a,c)=>a+c,0)}); }
    });
    if(points.length===0) return `<div class="no-data">No entries logged for ${ex.name} yet.</div>`;
    const recent = points.slice(-14);

    const w = 560, h = 150, padL = 34, padR = 10, padT = 14, padB = 22;
    const maxVal = Math.max(...recent.map(p=>p.value), 1);
    const stepX = recent.length>1 ? (w-padL-padR)/(recent.length-1) : 0;
    const coords = recent.map((p,i)=>{
      const x = padL + i*stepX;
      const y = padT + (h-padT-padB) * (1 - p.value/maxVal);
      return {x,y,...p};
    });
    const linePath = coords.map((c,i)=> (i===0?"M":"L") + c.x.toFixed(1) + " " + c.y.toFixed(1)).join(" ");
    const areaPath = linePath + ` L${coords[coords.length-1].x.toFixed(1)} ${h-padB} L${coords[0].x.toFixed(1)} ${h-padB} Z`;

    const gridLines = [0,0.5,1].map(f=>{
      const y = padT + (h-padT-padB)*f;
      return `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
    }).join("");

    const yTicks = [
      {v: maxVal, y: padT},
      {v: Math.round(maxVal/2), y: padT + (h-padT-padB)*0.5},
      {v: 0, y: h-padB},
    ].map(t=>`<text x="${padL-6}" y="${t.y+3}" fill="var(--text-dim2)" font-size="9" text-anchor="end" font-family="JetBrains Mono, monospace">${t.v}</text>`).join("");

    const labels = coords.filter((_,i)=> i===0 || i===coords.length-1 || i===Math.floor(coords.length/2))
      .map(c=>`<text x="${c.x}" y="${h-4}" fill="var(--text-dim2)" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">${fmtDate(c.date)}</text>`).join("");

    const dots = coords.map(c=>`<circle cx="${c.x}" cy="${c.y}" r="3" fill="#4fc3f7"><title>${fmtDate(c.date)}: ${c.value}</title></circle>`).join("");

    return `
      <div class="chart-caption">Y-axis: total ${unitLabel.toLowerCase()} of ${ex.name} logged per day &nbsp;·&nbsp; X-axis: date (last ${recent.length} logged session${recent.length===1?"":"s"})</div>
      <svg class="progress-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${gridLines}
        <path d="${areaPath}" fill="url(#areaGrad)" stroke="none"/>
        <path d="${linePath}" fill="none" stroke="#4fc3f7" stroke-width="2"/>
        ${yTicks}
        ${dots}
        ${labels}
      </svg>
    `;
  }

  function renderHistory(){
    if(!state.logs || state.logs.length===0) return `<div class="empty-note">No hunts recorded yet. Complete a quest to begin your log.</div>`;
    const sorted = state.logs.slice().sort((a,b)=> a.date<b.date?1:-1).slice(0,15);

  // Removes an entire logged day and unwinds its effect on Level/XP, streak, and stats
  // by recomputing everything from the remaining log history.
  function recomputeFromLogs(){
    const sorted = state.logs.slice().sort((a,b)=> a.date<b.date?-1:1);

    const totalXp = sorted.reduce((sum,l)=> sum+(l.totalXp||0), 0);
    state.level = 1;
    state.xp = totalXp;
    while(state.xp >= xpToNext(state.level)){
      state.xp -= xpToNext(state.level);
      state.level += 1;
    }

    if(sorted.length === 0){
      state.streak = 0;
      state.lastLogDate = null;
      state.grace.lastUsedDate = null;
    } else {
      let streak = 1;
      let graceLastUsed = null;
      for(let i=1;i<sorted.length;i++){
        const prev = sorted[i-1].date, curr = sorted[i].date;
        const gap = daysBetween(prev, curr);
        if(gap === 1){
          streak += 1;
        } else if(gap === 2){
          const missed = addDays(prev, 1);
          const graceAvailable = !graceLastUsed || daysBetween(graceLastUsed, missed) >= GRACE_WINDOW_DAYS;
          if(graceAvailable){ streak += 1; graceLastUsed = missed; }
          else { streak = 1; }
        } else {
          streak = 1;
        }
      }
      state.streak = streak;
      state.lastLogDate = sorted[sorted.length-1].date;
      state.grace.lastUsedDate = graceLastUsed;
    }
    checkStreakBreak();
  }

  function removeLogEntry(date){
    const log = state.logs.find(l=>l.date===date);
    if(!log) return;
    const summary = log.entries.map(e=>e.name).join(", ") || "this workout";
    showConfirmOverlay(`Remove ${fmtDate(date)} (${summary})? This will also adjust your XP, level, and streak to reflect the removal.`, ()=>{
      state.logs = state.logs.filter(l=>l.date!==date);
      recomputeFromLogs();
      saveState();
      render();
    });
  }

  function toggleInfoPopover(key, btnEl){
    const wasActive = btnEl.classList.contains("active");
    closeInfoPopover();
    if(wasActive) return;
    const content = INFO_CONTENT[key];
    if(!content) return;
    const popover = ensureInfoPopover();
    popover.innerHTML = `<div class="info-title">${content.title}</div><div>${content.text}</div>`;
    btnEl.classList.add("active");
    popover.classList.add("show");

    const rect = btnEl.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    let left = Math.min(Math.max(12, rect.left), vw - 272);
    let top = rect.bottom + 8;
    popover.style.left = left + "px";
    popover.style.top = top + "px";
    requestAnimationFrame(()=>{
      const pRect = popover.getBoundingClientRect();
      if(pRect.bottom > vh - 12){
        popover.style.top = Math.max(12, rect.top - pRect.height - 8) + "px";
      }
    });
  }
  // ---------- flourish: number count-up + level-up flash ----------
  let displayedValues = { level:0, xp:0, streak:0 };
  function prefersReducedMotion(){
    return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  }
  function animateNumberEl(el, from, to, duration){
    if(!el) return;
    if(from === to || prefersReducedMotion()){ el.textContent = to; return; }
    const start = performance.now();
    function step(now){
      const t = Math.min(1, (now-start)/duration);
      const eased = 1 - Math.pow(1-t, 3);
      el.textContent = Math.round(from + (to-from)*eased);
      if(t < 1) requestAnimationFrame(step);
      else el.textContent = to;
    }
    requestAnimationFrame(step);
  }

  // ---------- Guild Member Card ----------
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  // Reads an image file, center-crops it to a square, and returns a small JPEG data URL.
  function resizeImageToDataUrl(file, size){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          const side = Math.min(img.width, img.height);
          const sx = (img.width - side)/2, sy = (img.height - side)/2;
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
          resolve(canvas.toDataURL("image/jpeg", 0.85));
        };
        img.onerror = ()=>reject(new Error("Could not load image"));
        img.src = e.target.result;
      };
      reader.onerror = ()=>reject(new Error("Could not read file"));
      reader.readAsDataURL(file);
    });
  }
  function loadImage(src){
    return new Promise((resolve)=>{
      if(!src){ resolve(null); return; }
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = ()=>resolve(null);
      img.src = src;
    });
  }
  function shadeColor(hex, percent){
    const num = parseInt(hex.replace("#",""), 16);
    let r = (num >> 16) + Math.round(255*(percent/100));
    let g = ((num >> 8) & 0x00FF) + Math.round(255*(percent/100));
    let b = (num & 0x0000FF) + Math.round(255*(percent/100));
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return "#" + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
  }
  function roundedRect(ctx,x,y,w,h,r){
    w = Math.max(w, 0.001); h = Math.max(h, 0.001);
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function cutCornerPath(ctx,x,y,w,h,cut){
    ctx.beginPath();
    ctx.moveTo(x+cut,y);
    ctx.lineTo(x+w,y);
    ctx.lineTo(x+w,y+h-cut);
    ctx.lineTo(x+w-cut,y+h);
    ctx.lineTo(x,y+h);
    ctx.lineTo(x,y+cut);
    ctx.closePath();
  }
  function topLeftCutPath(ctx,x,y,w,h,cut){
    ctx.beginPath();
    ctx.moveTo(x+cut,y);
    ctx.lineTo(x+w,y);
    ctx.lineTo(x+w,y+h);
    ctx.lineTo(x,y+h);
    ctx.lineTo(x,y+cut);
    ctx.closePath();
  }
  // Draws img into the target box like CSS object-fit:cover (center-cropped, no distortion).
  function drawImageCover(ctx, img, x, y, w, h){
    const imgRatio = img.width/img.height, boxRatio = w/h;
    let sx, sy, sw, sh;
    if(imgRatio > boxRatio){
      sh = img.height; sw = sh*boxRatio; sx = (img.width-sw)/2; sy = 0;
    } else {
      sw = img.width; sh = sw/boxRatio; sx = 0; sy = (img.height-sh)/2;
    }
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  }
  // Deterministic decorative barcode, seeded from the hunter ID so it's stable, not random per render.
  function drawBarcode(ctx, x, y, w, h, seedStr, color){
    let seed = 0;
    for(let i=0;i<seedStr.length;i++){ seed = (seed*31 + seedStr.charCodeAt(i)) >>> 0; }
    function rand(){ seed = (seed*1103515245 + 12345) >>> 0; return (seed % 1000)/1000; }
    ctx.fillStyle = color;
    let cx = x;
    while(cx < x+w){
      const bw = 1 + rand()*3;
      if(rand() > 0.35){ ctx.fillRect(cx, y, bw, h); }
      cx += bw + 1 + rand()*2;
    }
  }

  function renderGuildCard(canvas, avatarImg){
    const ctx = canvas.getContext("2d");
    const scale = canvas.width / 1000;
    ctx.save();
    ctx.scale(scale, scale);
    const W = 1000, H = 600;
    ctx.clearRect(0,0,W,H);

    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0, "#0d1530");
    bg.addColorStop(1, "#05070f");
    ctx.fillStyle = bg;
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.fill();

    const rank = rankFor(state.level);
    const rankColor = RANK_COLORS[rank];

    const glow = ctx.createRadialGradient(W*0.5,0,50, W*0.5,0,650);
    glow.addColorStop(0, "rgba(79,195,247,0.14)");
    glow.addColorStop(1, "rgba(79,195,247,0)");
    ctx.fillStyle = glow;
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.fill();

    ctx.save();
    ctx.strokeStyle = rankColor;
    ctx.lineWidth = 3;
    ctx.shadowColor = rankColor;
    ctx.shadowBlur = 24;
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.stroke();
    ctx.restore();

    // Clip everything else to the card's own cut-corner shape so nothing bleeds into the corner notches
    ctx.save();
    cutCornerPath(ctx, 8, 8, W-16, H-16, 28);
    ctx.clip();

    // Solid rank-colored accent strip along the top edge — immediate rank read at a glance
    ctx.fillStyle = rankColor;
    ctx.fillRect(8, 8, W-16, 6);

    // ---- Photo panel (left, full-bleed, dominant, untouched by rank UI) ----
    const photoX=8, photoY=14, photoW=330, photoH=H-22;
    ctx.save();
    topLeftCutPath(ctx, photoX, photoY, photoW, photoH, 22);
    ctx.clip();
    ctx.fillStyle = "#0a0f22";
    ctx.fillRect(photoX, photoY, photoW, photoH);
    if(avatarImg){
      drawImageCover(ctx, avatarImg, photoX, photoY, photoW, photoH);
      const shade = ctx.createLinearGradient(0, photoY+photoH-170, 0, photoY+photoH);
      shade.addColorStop(0, "rgba(5,7,15,0)");
      shade.addColorStop(1, "rgba(5,7,15,0.9)");
      ctx.fillStyle = shade;
      ctx.fillRect(photoX, photoY, photoW, photoH);
    } else {
      ctx.fillStyle = "#232d4d";
      ctx.font = "130px Rajdhani, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("◈", photoX+photoW/2, photoY+photoH/2+45);
      ctx.textAlign = "left";
    }
    ctx.restore();
    ctx.save();
    ctx.strokeStyle = rankColor;
    ctx.lineWidth = 2;
    ctx.shadowColor = rankColor;
    ctx.shadowBlur = 12;
    topLeftCutPath(ctx, photoX, photoY, photoW, photoH, 22);
    ctx.stroke();
    ctx.restore();

    // Hunter name + ID overlaid on lower photo (license-photo caption style)
    const name = (state.hunterName && state.hunterName.trim()) || "Unnamed Hunter";
    ctx.textAlign = "left";
    ctx.fillStyle = "#ffffff";
    ctx.font = "900 26px Orbitron, sans-serif";
    ctx.fillText(name, photoX+22, photoY+photoH-50, photoW-44);
    ctx.fillStyle = "#c7d3ee";
    ctx.font = "600 14px 'JetBrains Mono', monospace";
    ctx.fillText(state.hunterId || "—", photoX+22, photoY+photoH-24);

    // ---- Divider between photo and info panel ----
    const dividerX = photoX + photoW + 17;
    ctx.strokeStyle = "rgba(94,169,255,0.28)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(dividerX, photoY+6); ctx.lineTo(dividerX, photoY+photoH-6); ctx.stroke();

    // ---- Info panel (right) ----
    const rx = photoX + photoW + 34;
    const rw = W - 22 - rx;

    ctx.fillStyle = "#5b6a94";
    ctx.font = "700 12px Orbitron, sans-serif";
    ctx.fillText("◆ SHADOW LOG ◆", rx, 32);

    // Rank hero block — the card's focal point, entirely off the photo
    const badgeSize = 100, badgeY = 56;
    ctx.save();
    ctx.shadowColor = rankColor; ctx.shadowBlur = 26;
    const badgeGrad = ctx.createLinearGradient(rx, badgeY, rx, badgeY+badgeSize);
    badgeGrad.addColorStop(0, rankColor);
    badgeGrad.addColorStop(1, shadeColor(rankColor, -30));
    ctx.fillStyle = badgeGrad;
    cutCornerPath(ctx, rx, badgeY, badgeSize, badgeSize, 14);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 1.5;
    cutCornerPath(ctx, rx, badgeY, badgeSize, badgeSize, 14);
    ctx.stroke();
    ctx.textAlign = "center";
    ctx.fillStyle = "#05070f";
    ctx.font = "900 52px Orbitron, sans-serif";
    ctx.fillText(rank, rx+badgeSize/2, badgeY+badgeSize/2+19);
    ctx.textAlign = "left";

    const heroTextX = rx + badgeSize + 26;
    ctx.fillStyle = "#ffffff";
    ctx.font = "700 32px 'JetBrains Mono', monospace";
    ctx.fillText("LEVEL " + state.level, heroTextX, badgeY+44);
    ctx.fillStyle = rankColor;
    ctx.font = "700 17px Rajdhani, sans-serif";
    ctx.fillText(rank + "-RANK HUNTER", heroTextX, badgeY+74);

    const dividerY = badgeY + badgeSize + 26;
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(rx, dividerY); ctx.lineTo(rx+rw, dividerY); ctx.stroke();

    // XP bar
    const need = xpToNext(state.level);
    const barX=rx, barY=dividerY+26, barW=rw, barH=16;
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    roundedRect(ctx,barX,barY,barW,barH,7); ctx.fill();
    const pct = Math.min(1, state.xp/need);
    const xpFillW = pct>0 ? Math.max(barW*pct, 7) : 0;
    const xpGrad = ctx.createLinearGradient(barX,0,barX+barW,0);
    xpGrad.addColorStop(0,"#2b6f96"); xpGrad.addColorStop(1,"#4fc3f7");
    ctx.fillStyle = xpGrad;
    ctx.shadowColor = "#4fc3f7"; ctx.shadowBlur = 8;
    roundedRect(ctx,barX,barY,xpFillW,barH,7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#a3aed0";
    ctx.font = "600 14px 'JetBrains Mono', monospace";
    ctx.fillText("XP " + state.xp + " / " + need, barX, barY+36);

    // STR / AGI / VIT — dynamically measured so labels never collide
    const stats = categoryPoints();
    const statColors = { STR:"#ff8a7a", AGI:"#7ce0a0", VIT:"#8fb8ff" };
    let statY = barY + 70;
    ["STR","AGI","VIT"].forEach(cat=>{
      const val = stats[cat] || 0;
      const info = tierInfo(val);
      const fillPct = tierFillPct(val)/100;

      ctx.font = "700 16px Orbitron, sans-serif";
      ctx.fillStyle = statColors[cat];
      ctx.fillText(cat, rx, statY);
      const catWidth = ctx.measureText(cat).width;

      ctx.font = "600 14px Rajdhani, sans-serif";
      ctx.fillStyle = "#b7c1e0";
      ctx.fillText("TIER " + info.label, rx + catWidth + 14, statY);

      ctx.textAlign = "right";
      ctx.fillStyle = "#e7ecfb";
      ctx.font = "600 14px 'JetBrains Mono', monospace";
      ctx.fillText(info.tier===3 ? val+" / MAX" : val+" / "+info.cap, rx+rw, statY);
      ctx.textAlign = "left";

      const sbY=statY+12, sbH=9;
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      roundedRect(ctx,rx,sbY,rw,sbH,4); ctx.fill();
      ctx.fillStyle = statColors[cat];
      ctx.shadowColor = statColors[cat]; ctx.shadowBlur = 6;
      const statFillW = fillPct>0 ? Math.max(rw*fillPct, 7) : 0;
      roundedRect(ctx,rx,sbY,statFillW,sbH,4); ctx.fill();
      ctx.shadowBlur = 0;
      statY += 56;
    });

    // Record stats panel — bordered module with a rank-colored top accent
    const panelY = statY + 6;
    const panelH = H - 40 - panelY - 18;
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    roundedRect(ctx, rx, panelY, rw, panelH, 8); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.16)";
    ctx.lineWidth = 1;
    roundedRect(ctx, rx, panelY, rw, panelH, 8); ctx.stroke();
    ctx.fillStyle = rankColor;
    roundedRect(ctx, rx, panelY, rw, 4, 2); ctx.fill();

    const longest = computeLongestStreak();
    const totalDays = (state.logs||[]).length;
    const colW = rw/3;
    function statBlock(label, value, color, colIdx, y){
      const bx = rx + colIdx*colW + colW/2;
      ctx.textAlign = "center";
      ctx.fillStyle = color;
      ctx.font = "900 38px Orbitron, sans-serif";
      ctx.shadowColor = color; ctx.shadowBlur = 10;
      ctx.fillText(String(value), bx, y);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#c3cce6";
      ctx.font = "600 13px Rajdhani, sans-serif";
      ctx.fillText(label.toUpperCase(), bx, y+24);
      ctx.textAlign = "left";
    }
    const streakY = panelY + panelH/2 + 8;
    statBlock("Hunt Streak", state.streak, "#f6c453", 0, streakY);
    statBlock("Longest Streak", longest, "#f6c453", 1, streakY);
    statBlock("Days Hunted", totalDays, "#4fc3f7", 2, streakY);
    // vertical separators inside the panel
    ctx.strokeStyle = "rgba(255,255,255,0.14)";
    [1,2].forEach(i=>{
      const lx = rx + colW*i;
      ctx.beginPath(); ctx.moveTo(lx, panelY+18); ctx.lineTo(lx, panelY+panelH-14); ctx.stroke();
    });

    // Footer + barcode
    ctx.fillStyle = "#a3aed0";
    ctx.font = "600 13px 'JetBrains Mono', monospace";
    const dateStr = new Date().toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});
    ctx.fillText("Issued via Shadow Log · " + dateStr, rx, H-40);
    ctx.fillStyle = "rgba(255,255,255,0.92)";
    roundedRect(ctx, rx, H-34, rw, 20, 3); ctx.fill();
    drawBarcode(ctx, rx+8, H-30, rw-16, 12, state.hunterId || "SHADOWLOG", "#0a0f22");

    ctx.restore(); // closes clip-to-card-shape save
    ctx.restore(); // closes DPR scale save
  }

      render();
    }
    overlay.querySelector("#saveSettingsBtn").addEventListener("click", save);
    overlay.querySelector("#closeSettingsBtn").addEventListener("click", close);
    input.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); save(); } });
    overlay.addEventListener("click", (e)=>{ if(e.target===overlay) close(); });
  }

  function showGuildCardOverlay(){
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="sys-window card-window">
        <div class="tag">◆ SNAPSHOT ◆</div>
        <h3>GUILD MEMBER CARD</h3>
        <canvas id="guildCardCanvas" width="2000" height="1200" class="guild-card-canvas"></canvas>
        <div class="card-actions">
          <button class="btn primary" id="downloadCardBtn">⬇ Download Card</button>
          <button class="btn ghost" id="closeCardBtn">Close</button>
        </div>
        <div class="card-hint">If the download doesn't start automatically, right-click (or long-press on mobile) the card above and choose "Save image."${!state.hunterName ? ` Set your Hunter Name at the top of the app to have it appear here.` : ""}</div>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=>overlay.classList.add("show"));

    const canvas = overlay.querySelector("#guildCardCanvas");
    drawCardWhenReady(canvas);

    overlay.querySelector("#downloadCardBtn").addEventListener("click", ()=>{
      const safeName = (state.hunterName||"hunter").trim().replace(/[^a-z0-9]+/gi,"-").toLowerCase() || "hunter";
      downloadCanvasImage(canvas, `shadow-log-card-${safeName}.png`);
    });

    function close(){
      overlay.classList.remove("show");
      setTimeout(()=>overlay.remove(), 250);
    }
    overlay.querySelector("#closeCardBtn").addEventListener("click", close);
    overlay.addEventListener("click", (e)=>{ if(e.target===overlay) close(); });
  }

  function showConfirmOverlay(message, onConfirm){
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="sys-window">
        <div class="tag">◆ SYSTEM WARNING ◆</div>
        <h3>CONFIRM ACTION</h3>
        <div class="line">${message}</div>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
          <button class="btn ghost" id="cancelConfirm">Cancel</button>
          <button class="btn primary" id="proceedConfirm">Confirm</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=>overlay.classList.add("show"));
    function close(){
      overlay.classList.remove("show");
      setTimeout(()=>overlay.remove(), 250);
    }
    overlay.querySelector("#cancelConfirm").addEventListener("click", close);
    overlay.querySelector("#proceedConfirm").addEventListener("click", ()=>{ close(); onConfirm(); });
    overlay.addEventListener("click", (e)=>{ if(e.target===overlay) close(); });
  }

  function showSystemWindow(xpGained, leveledUp, rankedUp, tierUps, bonusPct, bonusXp, usedGrace){
    tierUps = tierUps || [];
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="sys-window">
        <div class="tag">◆ SYSTEM NOTICE ◆</div>
        <h3>QUEST CLEARED</h3>
        <div class="line">XP gained: <b>+${xpGained}</b></div>
        ${bonusXp ? `<div class="line">Streak Bonus (${bonusPct}%): <b>+${bonusXp}</b></div>` : ""}
        ${usedGrace ? `<div class="line" style="color:var(--gold);">🛡 Rest Day used — streak protected.</div>` : ""}
        ${leveledUp ? `<div class="line">You have reached <b>Level ${state.level}</b>.</div>` : ""}
        ${rankedUp ? `<div class="rankup">RANK UP → ${rankedUp}-RANK HUNTER</div>` : ""}
        ${tierUps.map(t=>`<div class="rankup" style="color:var(--blue);text-shadow:0 0 12px rgba(79,195,247,0.5);">${t.cat} TIER UP → ${t.label}</div>`).join("")}
        <button class="btn primary" id="closeSysWindow">Continue</button>
      </div>
    `;
    document.body.appendChild(overlay);
    requestAnimationFrame(()=>overlay.classList.add("show"));
    function close(){
      overlay.classList.remove("show");
      setTimeout(()=>overlay.remove(), 250);
    }
    overlay.querySelector("#closeSysWindow").addEventListener("click", close);
    overlay.addEventListener("click", (e)=>{ if(e.target===overlay) close(); });
  }

  function bindEvents(){
    const openCardBtn = document.getElementById("openCardBtn");
    if(openCardBtn){ openCardBtn.addEventListener("click", showGuildCardOverlay); }

    document.querySelectorAll("[data-remove-log]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ removeLogEntry(btn.dataset.removeLog); });
    });

    const rerollBtn = document.getElementById("rerollBoardBtn");
    if(rerollBtn){ rerollBtn.addEventListener("click", rerollBoard); }

    document.querySelectorAll("[data-gate-rank]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ setGateRank(btn.dataset.gateRank); });
    });

    document.querySelectorAll("[data-accept]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ acceptContract(btn.dataset.accept); });
    });

    const toggleRoster = document.getElementById("toggleRoster");
    if(toggleRoster){
      toggleRoster.addEventListener("click", ()=>{ rosterFormOpen = !rosterFormOpen; render(); });
    }
    document.querySelectorAll("[data-roster-day]").forEach(sel=>{
      sel.addEventListener("change", ()=>{
        const day = parseInt(sel.dataset.rosterDay, 10);
        state.roster[day] = sel.value;
        saveState();
        render();
      });
    });

    const exerciseSelect = document.getElementById("exerciseSelect");
    const setValueInput = document.getElementById("setValueInput");
    if(exerciseSelect){
      exerciseSelect.addEventListener("change", ()=>{ setValueInput.placeholder = currentPlaceholder(); });
    }

    const addSetBtn = document.getElementById("addSetBtn");
    if(addSetBtn){
      addSetBtn.addEventListener("click", ()=>{
        const id = exerciseSelect.value;
        const ex = allExercises().find(e=>e.id===id);
        const val = parseInt(setValueInput.value, 10);
        if(!ex || !val || val<=0){ setValueInput.focus(); return; }
        let entry = builder.find(b=>b.id===id);
        if(!entry){ entry = {id:ex.id, name:ex.name, category:ex.category, type:ex.type, sets:[]}; builder.push(entry); }
        entry.sets.push(val);
        setValueInput.value = "";
        render();
        document.getElementById("exerciseSelect").value = id;
        document.getElementById("setValueInput").focus();
      });
    }
    if(setValueInput){
      setValueInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); addSetBtn.click(); } });
    }

    const openExerciseMgrBtn = document.getElementById("openExerciseMgrBtn");
    if(openExerciseMgrBtn){
      openExerciseMgrBtn.addEventListener("click", showExerciseManagerOverlay);
    }

    document.querySelectorAll(".pill-row .remove").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        builder.splice(parseInt(btn.dataset.idx,10),1);
        render();
      });
    });

    const completeBtn = document.getElementById("completeQuestBtn");
    if(completeBtn){ completeBtn.addEventListener("click", completeQuest); }

    const chartSelect = document.getElementById("chartSelect");
    if(chartSelect){
      chartSelect.addEventListener("change", ()=>{ selectedChartId = chartSelect.value; render(); });
    }

    const retrySaveBtn = document.getElementById("retrySaveBtn");
    if(retrySaveBtn){
      retrySaveBtn.addEventListener("click", retrySaveNow);
    }

    const resetBtn = document.getElementById("resetBtn");
    if(resetBtn){
      resetBtn.addEventListener("click", ()=>{
        showConfirmOverlay("Reset all Shadow Log data? This cannot be undone.", async ()=>{
          state = defaultState();
          builder = [];
          selectedChartId = null;
          acceptedContractIds = new Set();
          rosterFormOpen = false;
          await saveState();
          render();
        });
      });
    }
  }

  // ---------- init ----------
  async function init(){
    state = await loadState();
    checkStreakBreak();
    setupInfoBubbles();
    const settingsBtn = document.getElementById("settingsBtn");
    if(settingsBtn){ settingsBtn.addEventListener("click", showSettingsOverlay); }
    render();
  }
  init();
})();
</script>
</body>
</html>
